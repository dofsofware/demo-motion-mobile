<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 18</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}

@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 70px;
  z-index: 20;
  max-width: 3000px;
  width: 85%;
  position: relative;
  backdrop-filter: blur(2px);
  padding: 60px 0;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 20px 70px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideDownPop 0.7s cubic-bezier(0.34, 1.3, 0.55, 1) forwards;
  opacity: 0;
  transform-origin: top center;
}

.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}

.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 2px 5px rgba(37,99,235,0.2);
}

/* sous-titre */
.subheading {
  font-family: 'Sora', sans-serif;
  font-size: 80px;
  font-weight: 800;
  color: var(--p);
  text-align: center;
  opacity: 0;
  animation: slideDownPop 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
  animation-delay: 0.3s;
  max-width: 2800px;
  line-height: 1.2;
}

/* conteneur des cartes */
.cards-container {
  display: flex;
  gap: 60px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

/* carte individuelle */
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  background: rgba(224, 237, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.3);
  border-radius: 50px;
  padding: 50px 70px;
  min-width: 280px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
  opacity: 0;
  /* animation : glissement de la gauche vers la droite */
  animation: slideFromLeft 0.7s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
}

/* délais d'animation individuels : début après 1,5 secondes */
.card:nth-child(1) { animation-delay: 2.5s; }
.card:nth-child(2) { animation-delay: 3.3s; }
.card:nth-child(3) { animation-delay: 4.5s; }
.card:nth-child(4) { animation-delay: 5.5s; }

.card:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 50px -15px rgba(37,99,235,0.3);
  border-color: rgba(37, 99, 235, 0.6);
}

/* logo dans la carte */
.card-logo {
  width: 140px;
  height: 140px;
  object-fit: contain;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
  transition: transform 0.2s ease;
}
.card:hover .card-logo {
  transform: scale(1.05);
}

/* fallback en cas d'image manquante */
.card-logo-fallback {
  font-size: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 140px;
  height: 140px;
  background: white;
  border-radius: 40px;
}

.card-label {
  font-family: 'Sora', sans-serif;
  font-size: 44px;
  font-weight: 600;
  color: var(--p);
  text-align: center;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* animation de glissement de la gauche */
@keyframes slideFromLeft {
  0% {
    opacity: 0;
    transform: translateX(-300px) scale(0.85);
    filter: blur(12px);
  }
  60% {
    opacity: 1;
    transform: translateX(15px) scale(1.02);
    filter: blur(0);
  }
  80% {
    transform: translateX(-5px);
  }
  100% {
    opacity: 1;
    transform: translateX(0) scale(1);
    filter: blur(0);
  }
}

@keyframes slideDownPop {
  0% {
    opacity: 0;
    transform: translateY(-80px) scale(0.85);
    filter: blur(12px);
  }
  60% {
    opacity: 1;
    transform: translateY(8px) scale(1.02);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes badgeGlowPulse {
  0% {
    box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.3);
    border-color: rgba(37, 99, 235, 0.5);
  }
  50% {
    box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.15), 0 0 0 5px rgba(37, 99, 235, 0.2);
    border-color: rgba(37, 99, 235, 0.9);
  }
  100% {
    box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0);
    border-color: rgba(37, 99, 235, 0.5);
  }
}

@keyframes pulseDot {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
    box-shadow: 0 0 0 0 var(--s);
  }
  50% {
    transform: scale(1.2);
    opacity: 0.9;
    box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.4);
  }
}

/* cercle pulsant central */
.pulse-ring {
  position: absolute;
  width: 1200px;
  height: 1200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes largePulse {
  0% {
    transform: translate(-50%, -50%) scale(0.92);
    opacity: 0.5;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.12);
    opacity: 0.85;
  }
  100% {
    transform: translate(-50%, -50%) scale(0.92);
    opacity: 0.5;
  }
}

/* lignes flottantes */
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}
@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}
@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}

/* étincelles */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

/* ajustements 4K */
@media (max-width: 3840px) {
  .subheading { font-size: 70px; }
  .badge-text { font-size: 34px; }
  .badge-problem { padding: 16px 60px; gap: 22px; }
  .main-content { gap: 60px; }
  .card { padding: 40px 60px; }
  .card-logo { width: 120px; height: 120px; }
  .card-label { font-size: 40px; }
}
</style>
</head>
<body>
<div class="grid"></div>

<!-- orbes flottantes -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- lignes dynamiques -->
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>

<!-- particules -->
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>

<!-- cercle pulsant -->
<div class="pulse-ring"></div>

<div class="main-content">
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">MULTI-CANAL</span>
  </div>

  <h2 class="subheading">
    Vos clients choisissent<br>leur canal de communication :
  </h2>

  <div class="cards-container">
    <!-- WhatsApp -->
    <div class="card">
      <img class="card-logo" src="whatsapp.png" alt="WhatsApp" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';">
      <div class="card-logo-fallback fallback" style="display:none;">💚</div>
      <div class="card-label">WhatsApp</div>
    </div>

    <!-- SMS -->
    <div class="card">
      <img class="card-logo" src="sms.png" alt="SMS" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';">
      <div class="card-logo-fallback fallback" style="display:none;">📱</div>
      <div class="card-label">SMS</div>
    </div>

    <!-- Email -->
    <div class="card">
      <img class="card-logo" src="mail.png" alt="Email" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';">
      <div class="card-logo-fallback fallback" style="display:none;">📧</div>
      <div class="card-label">Email</div>
    </div>

    <!-- Notifications (application) -->
    <div class="card">
      <img class="card-logo" src="notification.png" alt="Notification App" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';">
      <div class="card-logo-fallback fallback" style="display:none;">🔔</div>
      <div class="card-label">Notification App</div>
    </div>
  </div>
</div>
</body>
</html>
