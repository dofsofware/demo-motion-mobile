<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 26 (Créative – Cartes larges)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}
@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 70px;
  z-index: 20;
  max-width: 3400px;
  width: 90%;
  position: relative;
  padding: 60px 0;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 20px 70px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideDownPop 0.7s cubic-bezier(0.34, 1.3, 0.55, 1) forwards;
  opacity: 0;
  transform-origin: top center;
}
.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}
.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* cartes */
.cards-container {
  display: flex;
  gap: 80px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
  width: 100%;
}
.card {
  background: rgba(224, 237, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.3);
  border-radius: 50px;
  padding: 50px 60px;
  width: 580px;         /* plus large */
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
  opacity: 0;
  transform: translateY(40px) scale(0.92);
  filter: blur(6px);
  position: relative;
  z-index: 2;
}
.card:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 50px -15px rgba(37,99,235,0.3);
  border-color: rgba(37, 99, 235, 0.6);
}
.card-icon {
  font-size: 100px;
  margin-bottom: 20px;
  text-align: center;
}
.card-title {
  font-family: 'Sora', sans-serif;
  font-size: 52px;
  font-weight: 700;
  text-align: center;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  margin-bottom: 20px;
}
/* conteneur d'animation interne */
.card-animation {
  min-height: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  font-size: 28px;
  color: var(--tm);
}

/* animations séquentielles */
.card:nth-child(1) { animation: cardAppear 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) 0.6s forwards; }
.card:nth-child(2) { animation: cardAppear 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) 1.4s forwards; }
.card:nth-child(3) { animation: cardAppear 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) 2.2s forwards; }

@keyframes cardAppear {
  0% { opacity: 0; transform: translateY(40px) scale(0.92); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* ligne de connexion animée */
.connector {
  position: absolute;
  top: 45%;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--s), transparent);
  transform: scaleX(0);
  transform-origin: left center;
  z-index: 1;
  pointer-events: none;
}
.connector.active {
  animation: drawLine 1.8s ease-out forwards;
}
@keyframes drawLine {
  0% { transform: scaleX(0); opacity: 0; }
  50% { transform: scaleX(1); opacity: 0.6; }
  100% { transform: scaleX(1); opacity: 0; }
}

/* animations internes */
@keyframes spinFast {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.spin-animation {
  animation: spinFast 0.6s linear;
}
@keyframes fillLine {
  from { width: 0; }
  to { width: 100%; }
}
.filling-bar {
  width: 0;
  height: 4px;
  background: var(--s);
  border-radius: 4px;
  transition: width 0.5s ease-out;
}
.count-up {
  font-weight: 700;
  color: var(--s);
}
.payment-status {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0,0,0,0.05);
  padding: 12px 24px;
  border-radius: 60px;
}
.status-badge {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #F59E0B;
  animation: pulseOrange 1s infinite;
}
.status-badge.paid {
  background: #22C55E;
  animation: none;
}
@keyframes pulseOrange {
  0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); }
  70% { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
  100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
}

/* autres keyframes existants */
@keyframes slideDownPop {
  0% { opacity: 0; transform: translateY(-80px) scale(0.85); filter: blur(12px); }
  60% { opacity: 1; transform: translateY(8px) scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes badgeGlowPulse {
  0% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.3); border-color: rgba(37,99,235,0.5); }
  50% { box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15), 0 0 0 5px rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.9); }
  100% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0); border-color: rgba(37,99,235,0.5); }
}
@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--s); }
  50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 0 8px rgba(37,99,235,0.4); }
}
/* décoratifs (inchangés) */
.pulse-ring {
  position: absolute;
  width: 1200px;
  height: 1200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes largePulse {
  0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
}
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}
@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}
@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}
@media (max-width: 3840px) {
  .badge-text { font-size: 34px; }
  .badge-problem { padding: 16px 60px; gap: 22px; }
  .main-content { gap: 70px; }
  .card { width: 560px; padding: 50px 50px; }
  .card-title { font-size: 48px; }
  .card-icon { font-size: 95px; }
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">FACTURATION SIMPLIFIÉE</span>
  </div>

  <div class="cards-container">
    <!-- Carte 1 : Création rapide -->
    <div class="card" id="card1">
      <div class="card-icon">⚡</div>
      <div class="card-title">Création rapide</div>
      <div class="card-animation" id="anim1">
        <div style="display: flex; gap: 20px; font-size: 28px;">
          <span>Facture #INV-2847</span>
          <span style="color: var(--s);">✨</span>
        </div>
        <div style="background: rgba(37,99,235,0.1); border-radius: 20px; padding: 16px; width: 100%; text-align: center;">
          <div style="font-size: 38px; font-weight: 600;" id="invoiceAmount">0 FCFA</div>
          <div class="filling-bar" id="fillingBar" style="width: 0%; margin-top: 12px;"></div>
        </div>
        <div id="creationDone" style="display: none; color: #22C55E; font-weight: 500;">✓ Facture générée en 0.8s</div>
      </div>
    </div>

    <!-- Carte 2 : Calcul automatique -->
    <div class="card" id="card2">
      <div class="card-icon">🔢</div>
      <div class="card-title">Calcul automatique</div>
      <div class="card-animation" id="anim2">
        <div style="font-size: 30px; margin-bottom: 10px;">Total HT</div>
        <div class="count-up" id="totalHT">0 FCFA</div>
        <div style="font-size: 30px; margin-top: 15px;">TVA (18%)</div>
        <div class="count-up" id="tvaAmount">0 FCFA</div>
        <div style="font-size: 30px; margin-top: 15px; font-weight: bold;">Net à payer</div>
        <div class="count-up" id="netAmount">0 FCFA</div>
        <div id="calcDone" style="display: none; color: #22C55E; font-weight: 500;">✓ Calcul instantané</div>
      </div>
    </div>

    <!-- Carte 3 : Suivi paiements -->
    <div class="card" id="card3">
      <div class="card-icon">💰</div>
      <div class="card-title">Suivi paiements</div>
      <div class="card-animation" id="anim3">
        <div class="payment-status" id="paymentStatus">
          <div class="status-badge" id="statusDot"></div>
          <span id="statusText">En attente</span>
        </div>
        <div style="font-size: 32px; margin-top: 20px;">Montant : 1 540 000 FCFA</div>
        <div style="width: 100%; background: rgba(0,0,0,0.1); border-radius: 20px; margin-top: 20px;">
          <div id="paymentProgress" style="width: 0%; height: 10px; background: #F59E0B; border-radius: 20px; transition: width 0.5s;"></div>
        </div>
        <div id="paymentDone" style="display: none; color: #22C55E; font-weight: 500;">✓ Paiement reçu</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Délais correspondant aux animations d'apparition
  const delays = {
    card1: 200,   // 0.6s
    card2: 900,  // 1.4s
    card3: 1500   // 2.2s
  };

  // Animation Carte 1 : Création rapide (remplissage de barre + montant qui compte)
  setTimeout(() => {
    const bar = document.getElementById('fillingBar');
    const amountSpan = document.getElementById('invoiceAmount');
    const targetAmount = 1234567;
    bar.style.width = '100%';
    let current = 0;
    const step = targetAmount / 40;
    const interval = setInterval(() => {
      current += step;
      if (current >= targetAmount) {
        current = targetAmount;
        clearInterval(interval);
        document.getElementById('creationDone').style.display = 'block';
      }
      amountSpan.innerText = Math.floor(current).toLocaleString('fr-FR') + ' FCFA';
    }, 15);
    // ajouter un effet de rotation sur l'icône
    const icon = document.querySelector('#card1 .card-icon');
    icon.classList.add('spin-animation');
    setTimeout(() => icon.classList.remove('spin-animation'), 600);
  }, delays.card1 + 400);

  // Animation Carte 2 : Calcul automatique (compteurs)
  setTimeout(() => {
    const htElem = document.getElementById('totalHT');
    const tvaElem = document.getElementById('tvaAmount');
    const netElem = document.getElementById('netAmount');
    const targetHT = 1300000;
    const tvaRate = 0.18;
    const targetTVA = targetHT * tvaRate;
    const targetNet = targetHT + targetTVA;

    let currentHT = 0, currentTVA = 0, currentNet = 0;
    const duration = 1000;
    const startTime = performance.now();
    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(1, elapsed / duration);
      currentHT = targetHT * progress;
      currentTVA = targetTVA * progress;
      currentNet = targetNet * progress;
      htElem.innerText = Math.floor(currentHT).toLocaleString('fr-FR') + ' FCFA';
      tvaElem.innerText = Math.floor(currentTVA).toLocaleString('fr-FR') + ' FCFA';
      netElem.innerText = Math.floor(currentNet).toLocaleString('fr-FR') + ' FCFA';
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        document.getElementById('calcDone').style.display = 'block';
      }
    }
    requestAnimationFrame(step);
  }, delays.card2 + 400);

  // Animation Carte 3 : Suivi paiements (barre de progression et changement de statut)
  setTimeout(() => {
    const progressBar = document.getElementById('paymentProgress');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    let width = 0;
    const interval = setInterval(() => {
      width += 5;
      progressBar.style.width = width + '%';
      if (width >= 100) {
        clearInterval(interval);
        statusText.innerText = 'Payé';
        statusDot.classList.add('paid');
        document.getElementById('paymentDone').style.display = 'block';
        progressBar.style.background = '#22C55E';
      } else if (width >= 70) {
        statusText.innerText = 'En cours de validation';
      } else if (width >= 30) {
        statusText.innerText = 'Virement en cours';
      }
    }, 50);
  }, delays.card3 + 400);

  // Ligne de connexion entre les cartes (effet de vague)
  setTimeout(() => {
    const connector = document.createElement('div');
    connector.className = 'connector';
    document.querySelector('.cards-container').appendChild(connector);
    setTimeout(() => connector.classList.add('active'), 10);
    setTimeout(() => connector.remove(), 2000);
  }, 1000);
</script>
</body>
</html>
