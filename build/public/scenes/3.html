<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 03</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
:root {
  --p:#0F2B6D; --s:#2563EB; --bg:#F5F9FF; --acc:#E0EDFF; --td:#0A1A3A; --tm:#2C3E66; --glow:rgba(37,99,235,0.3);
}
body {
  width:3840px; height:2160px;
  background:radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family:'Sora',sans-serif; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.grid { position:absolute; inset:0; background-image:linear-gradient(rgba(30,58,138,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,138,.045) 1px,transparent 1px); background-size:140px 140px; animation:gridShift 18s linear infinite; pointer-events:none; }
@keyframes gridShift { 0% { background-position:0 0; } 100% { background-position:140px 140px; } }

.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.4; pointer-events:none; animation:orbFloat 14s ease-in-out infinite alternate; }
.orb-1 { width:800px; height:800px; background:radial-gradient(circle,rgba(37,99,235,0.2),transparent); top:10%; left:-10%; animation-duration:22s; }
.orb-2 { width:1100px; height:1100px; background:radial-gradient(circle,rgba(15,43,109,0.18),transparent); bottom:-20%; right:-15%; animation-duration:26s; animation-direction:alternate-reverse; }
.orb-3 { width:500px; height:500px; background:radial-gradient(circle,rgba(37,99,235,0.25),transparent); top:50%; left:70%; animation-duration:18s; filter:blur(70px); }
@keyframes orbFloat { 0% { transform:translate(0,0) scale(1); } 100% { transform:translate(5%,8%) scale(1.1); } }

.floating-line { position:absolute; width:200%; height:2px; background:linear-gradient(90deg,transparent,rgba(37,99,235,0.3),transparent); top:35%; left:-50%; transform:rotate(8deg); animation:driftLine 12s linear infinite; pointer-events:none; z-index:1; }
.floating-line2 { top:70%; transform:rotate(-5deg); animation:driftLineReverse 14s linear infinite; width:180%; }
@keyframes driftLine { 0% { transform:translateX(-30%) rotate(8deg); opacity:0; } 20% { opacity:0.5; } 80% { opacity:0.5; } 100% { transform:translateX(40%) rotate(8deg); opacity:0; } }
@keyframes driftLineReverse { 0% { transform:translateX(40%) rotate(-5deg); opacity:0; } 20% { opacity:0.4; } 80% { opacity:0.4; } 100% { transform:translateX(-50%) rotate(-5deg); opacity:0; } }

.spark { position:absolute; width:6px; height:6px; background:var(--s); border-radius:50%; opacity:0; animation:sparkle 3s ease-in-out infinite; pointer-events:none; filter:blur(1px); }
.spark-1 { top:20%; left:15%; animation-delay:0s; width:10px; height:10px; }
.spark-2 { top:65%; left:85%; animation-delay:0.7s; }
.spark-3 { top:80%; left:30%; animation-delay:1.2s; width:8px; height:8px; }
.spark-4 { top:40%; left:72%; animation-delay:0.3s; }
.spark-5 { top:15%; left:88%; animation-delay:1.8s; }
@keyframes sparkle { 0% { opacity:0; transform:scale(0); background:#60A5FA; } 30% { opacity:0.7; transform:scale(1.2); background:#3B82F6; } 70% { opacity:0.4; transform:scale(0.8); } 100% { opacity:0; transform:scale(0); } }

.pulse-ring { position:absolute; width:1200px; height:1200px; border-radius:50%; background:radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(37,99,235,0.02) 60%, transparent 85%); top:50%; left:50%; transform:translate(-50%,-50%); animation:largePulse 5s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes largePulse { 0% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } 50% { transform:translate(-50%,-50%) scale(1.12); opacity:0.85; } 100% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } }

/* ---- LAYOUT ---- */
.main-content {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:100px; z-index:20; max-width:3200px; width:88%; position:relative; padding:60px 0;
}

/* ---- BADGE ---- */
.badge-problem {
  display:inline-flex; align-items:center; gap:28px;
  background:rgba(224,237,255,0.75); backdrop-filter:blur(12px);
  border:2px solid rgba(37,99,235,0.5); border-radius:120px; padding:20px 70px;
  opacity:0;
  animation:badgeGlowPulse 2.8s infinite, slideDownPop 0.75s cubic-bezier(0.34,1.3,0.55,1) forwards;
}
.pulse-dot { width:20px; height:20px; background:var(--s); border-radius:50%; box-shadow:0 0 12px var(--s); animation:pulseDot 1.6s ease-in-out infinite; }
.badge-text { font-family:'Sora',sans-serif; font-size:38px; font-weight:700; letter-spacing:6px; text-transform:uppercase; background:linear-gradient(135deg,#1E3A8A,#2563EB); background-clip:text; -webkit-background-clip:text; color:transparent; }

/* ---- CARDS CONTAINER ---- */
.cards-container {
  display:flex; gap:80px; align-items:stretch;
}

/* Chaque carte entre séquentiellement */
.card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(16px);
  border: 2px solid rgba(37,99,235,0.18);
  border-radius: 40px;
  padding: 70px 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  position: relative;
  overflow: hidden;
  /* état initial invisible */
  opacity: 0;
  transform: translateY(120px) scale(0.88);
  /* glow de fond */
  box-shadow:
    0 30px 60px -20px rgba(37,99,235,0.12),
    0 0 0 0 rgba(37,99,235,0.15),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

/* shimmer interne */
.card::before {
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 60%);
  border-radius:inherit;
  pointer-events:none;
}

/* entrée par stagger : carte 1 = excel */
.card-1 { animation: cardEntrance 0.75s cubic-bezier(0.22,1,0.36,1) forwards, cardFloat 4.5s ease-in-out 0.75s infinite alternate, cardGlow 3s ease-in-out 0.75s infinite; }
/* carte 2 = whatsapp */
.card-2 { animation: cardEntrance 0.75s cubic-bezier(0.22,1,0.36,1) 0.18s forwards, cardFloat 4.5s ease-in-out 0.93s infinite alternate, cardGlow 3s ease-in-out 0.93s infinite; }
/* carte 3 = phone */
.card-3 { animation: cardEntrance 0.75s cubic-bezier(0.22,1,0.36,1) 0.36s forwards, cardFloat 4.5s ease-in-out 1.11s infinite alternate, cardGlow 3s ease-in-out 1.11s infinite; }

/* image logo dans la carte */
.card-logo {
  width: 200px;
  height: 200px;
  object-fit: contain;
  filter: drop-shadow(0 12px 24px rgba(37,99,235,0.18));
  transition: transform 0.3s ease;
  animation: logoBreath 3s ease-in-out infinite alternate;
}

.card-label {
  font-family:'Sora',sans-serif;
  font-size:46px;
  font-weight:700;
  background: linear-gradient(135deg, var(--p), var(--s));
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  letter-spacing:-0.01em;
  white-space:nowrap;
}

/* numéro ordinal animé */
.card-number {
  position:absolute;
  top:22px; right:30px;
  font-size:30px;
  font-weight:800;
  color: rgba(37,99,235,0.18);
  font-family:'Sora',sans-serif;
  letter-spacing:-0.02em;
}

/* ---- TITRE ---- */
.glitch-title {
  font-family:'Sora',sans-serif;
  font-size:110px;
  font-weight:800;
  line-height:1.18;
  text-align:center;
  letter-spacing:-0.025em;
  background:linear-gradient(130deg, var(--p) 0%, var(--s) 45%, #3B82F6 65%, var(--p) 100%);
  background-size:200% auto;
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  animation:textShine 4s linear infinite, riseGlow 0.9s cubic-bezier(0.2,0.9,0.3,1.2) 0.4s forwards;
  opacity:0;
  max-width:2800px;
}

/* ---- CONNECTOR LINE between cards ---- */
.connector {
  align-self:center;
  width:80px;
  height:3px;
  background: linear-gradient(90deg, rgba(37,99,235,0.3), rgba(37,99,235,0.7), rgba(37,99,235,0.3));
  border-radius:4px;
  position:relative;
  opacity:0;
  animation: connectorFade 0.4s ease forwards;
}
.connector-1 { animation-delay: 0.28s; }
.connector-2 { animation-delay: 0.46s; }

/* dot sur le connecteur */
.connector::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:14px; height:14px;
  background:var(--s);
  border-radius:50%;
  box-shadow:0 0 10px var(--s);
  animation:dotSlide 1.8s ease-in-out infinite;
}
@keyframes dotSlide {
  0%   { left:0%; transform:translate(0,-50%); opacity:0.5; }
  50%  { left:50%; transform:translate(-50%,-50%); opacity:1; }
  100% { left:100%; transform:translate(-100%,-50%); opacity:0.5; }
}

/* ---- KEYFRAMES ---- */
@keyframes slideDownPop {
  0%   { opacity:0; transform:translateY(-80px) scale(0.85); filter:blur(12px); }
  60%  { opacity:1; transform:translateY(8px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes cardEntrance {
  0%   { opacity:0; transform:translateY(120px) scale(0.88); filter:blur(10px); }
  55%  { opacity:1; transform:translateY(-10px) scale(1.02); filter:blur(0); }
  80%  { transform:translateY(4px) scale(0.99); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes cardFloat {
  0%   { transform:translateY(0px) rotate(0deg); }
  100% { transform:translateY(-14px) rotate(0.5deg); }
}

@keyframes cardGlow {
  0%,100% { box-shadow:0 30px 60px -20px rgba(37,99,235,0.12), 0 0 0 0 rgba(37,99,235,0.08), inset 0 1px 0 rgba(255,255,255,0.9); }
  50%      { box-shadow:0 40px 80px -15px rgba(37,99,235,0.22), 0 0 40px rgba(37,99,235,0.1), inset 0 1px 0 rgba(255,255,255,0.9); }
}

@keyframes logoBreath {
  0%   { transform:scale(1) translateY(0); filter:drop-shadow(0 12px 24px rgba(37,99,235,0.18)); }
  100% { transform:scale(1.06) translateY(-6px); filter:drop-shadow(0 18px 32px rgba(37,99,235,0.28)); }
}

@keyframes connectorFade {
  from { opacity:0; transform:scaleX(0); }
  to   { opacity:1; transform:scaleX(1); }
}

@keyframes riseGlow {
  0%   { opacity:0; transform:translateY(100px) scale(0.92); filter:blur(8px); }
  40%  { opacity:0.9; transform:translateY(-12px) scale(1.01); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes badgeGlowPulse {
  0%   { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(37,99,235,0.3); border-color:rgba(37,99,235,0.5); }
  50%  { box-shadow:0 20px 35px -8px rgba(0,0,0,0.15),0 0 0 5px rgba(37,99,235,0.2); border-color:rgba(37,99,235,0.9); }
  100% { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(37,99,235,0); border-color:rgba(37,99,235,0.5); }
}

@keyframes pulseDot {
  0%,100% { transform:scale(1); opacity:1; box-shadow:0 0 0 0 var(--s); }
  50%      { transform:scale(1.2); opacity:0.9; box-shadow:0 0 0 8px rgba(37,99,235,0.4); }
}

@keyframes textShine {
  0%   { background-position:0% 50%; }
  100% { background-position:200% 50%; }
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="floating-line"></div><div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div><div class="spark spark-2"></div><div class="spark spark-3"></div><div class="spark spark-4"></div><div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">

  <!-- Badge -->
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">Le quotidien</span>
  </div>

  <!-- Cards avec logos images -->
  <div class="cards-container">

    <!-- Carte 1 : Excel -->
    <div class="card card-1">
      <span class="card-number">01</span>
      <img class="card-logo" src="excel.png" alt="Excel" />
      <span class="card-label">Excel</span>
    </div>

    <!-- Connecteur animé -->
    <div class="connector connector-1"></div>

    <!-- Carte 2 : WhatsApp -->
    <div class="card card-2">
      <span class="card-number">02</span>
      <img class="card-logo" src="whatsapp.png" alt="WhatsApp" />
      <span class="card-label">WhatsApp</span>
    </div>

    <!-- Connecteur animé -->
    <div class="connector connector-2"></div>

    <!-- Carte 3 : Appels clients -->
    <div class="card card-3">
      <span class="card-number">03</span>
      <img class="card-logo" src="phone.png" alt="Appels clients" />
      <span class="card-label">Appels clients</span>
    </div>

  </div>

  <!-- Titre -->
  <h1 class="glitch-title">Entre Excel, WhatsApp et les appels clients…</h1>

</div>
</body>
</html>
