<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 07</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

:root {
  --p:#0F2B6D; --bg-dark:#0A1A3A; --white:rgba(255,255,255,1); --glow:rgba(255,255,255,0.2);
}

body {
  width:3840px; height:2160px;
  background:radial-gradient(circle at 50% 30%, #0F2B6D 0%, #0A1A3A 100%);
  font-family:'Sora',sans-serif; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
}

/* grille */
.grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.035) 1px,transparent 1px); background-size:140px 140px; animation:gridShift 18s linear infinite; pointer-events:none; }
@keyframes gridShift { 0% { background-position:0 0; } 100% { background-position:140px 140px; } }

/* orbes */
.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.25; pointer-events:none; animation:orbFloat 14s ease-in-out infinite alternate; }
.orb-1 { width:800px; height:800px; background:radial-gradient(circle,rgba(59,130,246,0.3),transparent); top:10%; left:-10%; animation-duration:22s; }
.orb-2 { width:1100px; height:1100px; background:radial-gradient(circle,rgba(255,255,255,0.15),transparent); bottom:-20%; right:-15%; animation-duration:26s; animation-direction:alternate-reverse; }
.orb-3 { width:500px; height:500px; background:radial-gradient(circle,rgba(37,99,235,0.25),transparent); top:50%; left:70%; animation-duration:18s; filter:blur(70px); }
@keyframes orbFloat { 0% { transform:translate(0,0) scale(1); } 100% { transform:translate(5%,8%) scale(1.1); } }

.floating-line { position:absolute; width:200%; height:2px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); top:35%; left:-50%; transform:rotate(8deg); animation:driftLine 12s linear infinite; pointer-events:none; z-index:1; }
.floating-line2 { top:70%; transform:rotate(-5deg); animation:driftLineReverse 14s linear infinite; width:180%; }
@keyframes driftLine { 0% { transform:translateX(-30%) rotate(8deg); opacity:0; } 20% { opacity:0.5; } 80% { opacity:0.5; } 100% { transform:translateX(40%) rotate(8deg); opacity:0; } }
@keyframes driftLineReverse { 0% { transform:translateX(40%) rotate(-5deg); opacity:0; } 20% { opacity:0.4; } 80% { opacity:0.4; } 100% { transform:translateX(-50%) rotate(-5deg); opacity:0; } }

.spark { position:absolute; border-radius:50%; opacity:0; animation:sparkle 3s ease-in-out infinite; pointer-events:none; filter:blur(1px); background:white; width:6px; height:6px; }
.spark-1 { top:20%; left:15%; animation-delay:0s; width:10px; height:10px; }
.spark-2 { top:65%; left:85%; animation-delay:0.7s; }
.spark-3 { top:80%; left:30%; animation-delay:1.2s; width:8px; height:8px; }
.spark-4 { top:40%; left:72%; animation-delay:0.3s; }
.spark-5 { top:15%; left:88%; animation-delay:1.8s; }
@keyframes sparkle { 0% { opacity:0; transform:scale(0); } 30% { opacity:0.7; transform:scale(1.2); } 70% { opacity:0.4; } 100% { opacity:0; transform:scale(0); } }

.pulse-ring { position:absolute; width:1200px; height:1200px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.02) 60%,transparent 85%); top:50%; left:50%; transform:translate(-50%,-50%); animation:largePulse 5s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes largePulse { 0% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } 50% { transform:translate(-50%,-50%) scale(1.12); opacity:0.85; } 100% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } }

/* =====================================================
   FLASH D'IMPACT — couvre tout l'écran au départ
   ===================================================== */
.impact-flash {
  position:absolute; inset:0; z-index:100;
  background:white;
  animation:flashOut 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  pointer-events:none;
}
@keyframes flashOut {
  0%   { opacity:0.85; }
  40%  { opacity:0.3; }
  100% { opacity:0; visibility:hidden; }
}

/* =====================================================
   LIGNES DE CHOC — rayonnent depuis le centre
   ===================================================== */
.shockwave-container {
  position:absolute; top:50%; left:50%;
  width:0; height:0;
  z-index:50; pointer-events:none;
}

.shock-ring {
  position:absolute;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.6);
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  animation:shockRingExpand 0.9s cubic-bezier(0.22,0.6,0.36,1) forwards;
}
.shock-ring-1 { width:300px; height:300px; animation-delay:0.05s; }
.shock-ring-2 { width:700px; height:700px; animation-delay:0.18s; border-color:rgba(255,255,255,0.35); }
.shock-ring-3 { width:1400px; height:1400px; animation-delay:0.32s; border-color:rgba(255,255,255,0.15); border-width:3px; }
.shock-ring-4 { width:2400px; height:2400px; animation-delay:0.48s; border-color:rgba(255,255,255,0.07); border-width:2px; }

@keyframes shockRingExpand {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0.9; }
  60%  { opacity:0.7; }
  100% { transform:translate(-50%,-50%) scale(1); opacity:0; }
}

/* lignes radiales de choc */
.shock-line {
  position:absolute;
  top:50%; left:50%;
  width:1000px; height:3px;
  background:linear-gradient(90deg, rgba(255,255,255,0.7), transparent);
  transform-origin:left center;
  opacity:0;
  animation:shockLineBlast 0.6s cubic-bezier(0.22,1,0.36,1) 0.03s forwards;
}
.shock-line:nth-child(1)  { transform:rotate(0deg); }
.shock-line:nth-child(2)  { transform:rotate(45deg); }
.shock-line:nth-child(3)  { transform:rotate(90deg); }
.shock-line:nth-child(4)  { transform:rotate(135deg); }
.shock-line:nth-child(5)  { transform:rotate(180deg); }
.shock-line:nth-child(6)  { transform:rotate(225deg); }
.shock-line:nth-child(7)  { transform:rotate(270deg); }
.shock-line:nth-child(8)  { transform:rotate(315deg); }
.shock-line:nth-child(9)  { transform:rotate(22.5deg); width:600px; opacity:0; }
.shock-line:nth-child(10) { transform:rotate(67.5deg); width:600px; opacity:0; }
.shock-line:nth-child(11) { transform:rotate(112.5deg); width:600px; opacity:0; }
.shock-line:nth-child(12) { transform:rotate(157.5deg); width:600px; opacity:0; }

@keyframes shockLineBlast {
  0%   { opacity:0.85; transform:rotate(var(--r,0deg)) scaleX(0); }
  50%  { opacity:0.6; transform:rotate(var(--r,0deg)) scaleX(1); }
  100% { opacity:0; transform:rotate(var(--r,0deg)) scaleX(1.2); }
}

/* =====================================================
   CONTENU PRINCIPAL
   ===================================================== */
.main-content {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:70px; z-index:20; max-width:3000px; width:85%; position:relative; padding:60px 0;
}

/* BADGE — tombe depuis le haut avec impact */
.badge-problem {
  display:inline-flex; align-items:center; gap:28px;
  background:rgba(255,255,255,0.12); backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,0.3); border-radius:120px; padding:20px 70px;
  opacity:0;
  animation:
    badgeImpact 0.65s cubic-bezier(0.22,1,0.36,1) 0.1s forwards,
    badgeGlowPulse 2.8s 0.8s infinite;
}
.pulse-dot { width:20px; height:20px; background:white; border-radius:50%; box-shadow:0 0 12px white; animation:pulseDot 1.6s ease-in-out infinite; }
.badge-text { font-family:'Sora',sans-serif; font-size:38px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:white; }

/* ICÔNE MAIN — zoom brutal depuis le centre */
.icon-container {
  width:320px; height:320px; border-radius:50%;
  background:rgba(255,255,255,0.08); backdrop-filter:blur(8px);
  border:3px solid rgba(255,255,255,0.4);
  display:flex; align-items:center; justify-content:center;
  font-size:150px;
  opacity:0;
  transform-origin:center;
  box-shadow:0 20px 40px -10px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,255,255,0.3);
  animation:
    handSmash 0.7s cubic-bezier(0.12,0.9,0.2,1.15) forwards,
    handFloat 3.5s ease-in-out 0.9s infinite alternate,
    handGlow 2s ease-in-out 0.9s infinite;
}

/* MOT "STOP." — explose depuis le centre, lourd et brutal */
.glitch-title {
  font-family:'Sora',sans-serif;
  font-size:260px; font-weight:800; line-height:1;
  text-align:center; letter-spacing:-0.04em;
  color:white;
  opacity:0;
  text-shadow:
    0 0 0px rgba(255,255,255,0),
    0 10px 30px rgba(0,0,0,0.5);
  max-width:2800px; margin:0 auto;
  animation: stopImpact 0.55s cubic-bezier(0.12,0.8,0.2,1.2) 0.08s forwards;
  position:relative;
}

/* Chaque lettre de STOP entre depuis une direction différente */
.letter-s { display:inline-block; opacity:0; animation:letterFromLeft  0.5s cubic-bezier(0.22,1,0.36,1) 0.05s forwards; }
.letter-t { display:inline-block; opacity:0; animation:letterFromTop   0.5s cubic-bezier(0.22,1,0.36,1) 0.12s forwards; }
.letter-o { display:inline-block; opacity:0; animation:letterFromBottom 0.5s cubic-bezier(0.22,1,0.36,1) 0.19s forwards; }
.letter-p { display:inline-block; opacity:0; animation:letterFromRight  0.5s cubic-bezier(0.22,1,0.36,1) 0.26s forwards; }
.letter-dot { display:inline-block; opacity:0; animation:letterPop 0.4s cubic-bezier(0.22,1,0.36,1) 0.38s forwards; color:rgba(255,255,255,0.6); }

/* SOUS-TITRE — glisse depuis le bas */
.subtitle {
  font-size:56px; font-weight:300; color:rgba(255,255,255,0.7);
  letter-spacing:-0.01em;
  background:rgba(0,0,0,0.2); backdrop-filter:blur(4px);
  padding:12px 40px; border-radius:80px;
  display:inline-block;
  opacity:0;
  animation:subtitleRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;
}

/* =====================================================
   KEYFRAMES IMPACT
   ===================================================== */

/* Badge tombe du ciel */
@keyframes badgeImpact {
  0%   { opacity:0; transform:translateY(-200px) scale(0.7); filter:blur(8px); }
  55%  { opacity:1; transform:translateY(12px) scale(1.03); filter:blur(0); }
  75%  { transform:translateY(-4px) scale(0.98); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

/* Main s'écrase depuis le haut */
@keyframes handSmash {
  0%   { opacity:0; transform:translateY(-400px) scale(1.4) rotate(-8deg); filter:blur(6px); }
  55%  { opacity:1; transform:translateY(18px) scale(0.95) rotate(1deg); }
  75%  { transform:translateY(-6px) scale(1.02) rotate(-0.5deg); }
  100% { opacity:1; transform:translateY(0) scale(1) rotate(0deg); filter:blur(0); }
}

/* Flottement de la main */
@keyframes handFloat {
  0%   { transform:translateY(0px) rotate(0deg); }
  100% { transform:translateY(-12px) rotate(1.5deg); }
}

/* Halo pulsant sur la main */
@keyframes handGlow {
  0%,100% { box-shadow:0 20px 40px -10px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,255,255,0.15); }
  50%      { box-shadow:0 30px 60px -8px rgba(0,0,0,0.5), 0 0 60px rgba(255,255,255,0.12); }
}

/* Lettres individuelles */
@keyframes letterFromLeft {
  0%   { opacity:0; transform:translateX(-280px) scale(0.8); filter:blur(8px); }
  60%  { opacity:1; transform:translateX(10px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
@keyframes letterFromTop {
  0%   { opacity:0; transform:translateY(-280px) scale(0.8); filter:blur(8px); }
  60%  { opacity:1; transform:translateY(10px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes letterFromBottom {
  0%   { opacity:0; transform:translateY(280px) scale(0.8); filter:blur(8px); }
  60%  { opacity:1; transform:translateY(-10px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes letterFromRight {
  0%   { opacity:0; transform:translateX(280px) scale(0.8); filter:blur(8px); }
  60%  { opacity:1; transform:translateX(-10px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
@keyframes letterPop {
  0%   { opacity:0; transform:scale(0) rotate(180deg); }
  60%  { opacity:1; transform:scale(1.3) rotate(-5deg); }
  100% { opacity:1; transform:scale(1) rotate(0deg); }
}

/* stopImpact — titre global légère vibration après convergence */
@keyframes stopImpact {
  0%   { opacity:1; }
  15%  { transform:scale(1.015) translateY(-3px); }
  30%  { transform:scale(0.997) translateY(2px); }
  50%  { transform:scale(1.005); }
  100% { opacity:1; transform:scale(1) translateY(0); text-shadow:0 0 80px rgba(255,255,255,0.15), 0 10px 30px rgba(0,0,0,0.5); }
}

/* Sous-titre monte */
@keyframes subtitleRise {
  0%   { opacity:0; transform:translateY(80px) scale(0.95); filter:blur(6px); }
  60%  { opacity:1; transform:translateY(-6px) scale(1.01); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes badgeGlowPulse {
  0%   { box-shadow:0 15px 30px -10px rgba(0,0,0,0.2),0 0 0 0 rgba(255,255,255,0.3); border-color:rgba(255,255,255,0.4); }
  50%  { box-shadow:0 20px 35px -8px rgba(0,0,0,0.25),0 0 0 5px rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.8); }
  100% { box-shadow:0 15px 30px -10px rgba(0,0,0,0.2),0 0 0 0 rgba(255,255,255,0); border-color:rgba(255,255,255,0.4); }
}

@keyframes pulseDot {
  0%,100% { transform:scale(1); opacity:1; box-shadow:0 0 0 0 white; }
  50%      { transform:scale(1.2); opacity:0.9; box-shadow:0 0 0 8px rgba(255,255,255,0.4); }
}

/* ajustements 4K */
@media (max-width:3840px) {
  .glitch-title { font-size:220px; }
  .subtitle { font-size:48px; }
  .badge-text { font-size:34px; }
  .badge-problem { padding:16px 60px; gap:22px; }
  .main-content { gap:60px; }
}
.prog, .prog-f { display:none !important; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="floating-line"></div><div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div><div class="spark spark-2"></div><div class="spark spark-3"></div><div class="spark spark-4"></div><div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<!-- Flash d'impact initial -->
<div class="impact-flash"></div>

<!-- Ondes de choc rayonnantes -->
<div class="shockwave-container">
  <div class="shock-ring shock-ring-1"></div>
  <div class="shock-ring shock-ring-2"></div>
  <div class="shock-ring shock-ring-3"></div>
  <div class="shock-ring shock-ring-4"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
  <div class="shock-line"></div>
</div>

<div class="main-content">

  <!-- Badge -->
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">STOP</span>
  </div>

  <!-- Icône main -->
  <div class="icon-container">✋</div>

  <!-- Titre STOP lettre par lettre -->
  <h1 class="glitch-title">
    <span class="letter-s">S</span><span class="letter-t">T</span><span class="letter-o">O</span><span class="letter-p">P</span><span class="letter-dot">.</span>
  </h1>

  <!-- Sous-titre -->
  <p class="subtitle">Il est temps de changer.</p>

</div>
</body>
</html>
