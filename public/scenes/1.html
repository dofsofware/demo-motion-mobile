<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 01</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}

@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* lignes dynamiques flottantes */
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}

.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}

@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}

@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}

/* étincelles */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }

@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

/* cercle pulsant central */
.pulse-ring {
  position: absolute;
  width: 1200px;
  height: 1200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes largePulse {
  0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
}

/* =====================
   LAYOUT PRINCIPAL : deux colonnes
   ===================== */
.main-content {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0;
  z-index: 20;
  width: 92%;
  max-width: 3600px;
  height: 80%;
  position: relative;
}

/* ---- COLONNE GAUCHE : image ---- */
.col-image {
  flex: 0 0 46%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 80px;
  /* Animation : entre par la gauche */
  opacity: 0;
  transform: translateX(-220px);
  animation: slideFromLeft 1s cubic-bezier(0.2, 0.9, 0.4, 1) 0.2s forwards;
}

.hero-image {
  width: 100%;
  max-width: 1500px;
  height: auto;
  object-fit: contain;
  /* légère animation de flottement une fois en place */
  animation: slideFromLeft 1s cubic-bezier(0.2, 0.9, 0.4, 1) 0.2s forwards,
             floatImage 4s ease-in-out 1.2s infinite alternate;
  opacity: 0;
  filter: drop-shadow(0 40px 80px rgba(37,99,235,0.18));
}

/* ---- SÉPARATEUR VERTICAL ---- */
.divider {
  flex: 0 0 3px;
  height: 60%;
  background: linear-gradient(180deg, transparent, rgba(37,99,235,0.25) 30%, rgba(37,99,235,0.4) 50%, rgba(37,99,235,0.25) 70%, transparent);
  border-radius: 4px;
  align-self: center;
  opacity: 0;
  animation: fadeIn 0.6s ease 1s forwards;
}

/* ---- COLONNE DROITE : textes ---- */
.col-text {
  flex: 0 0 54%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding-left: 120px;
  gap: 70px;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 20px 70px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideFromRight 0.8s cubic-bezier(0.34, 1.3, 0.55, 1) 0.5s forwards;
  opacity: 0;
}

.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}

.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* SVG horloge */
.motion-svg {
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
  animation: slideFromRight 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.7s forwards, floatSoft 3s ease-in-out 1.6s infinite alternate;
  opacity: 0;
}

/* Titre */
.glitch-title {
  font-family: 'Sora', sans-serif;
  font-size: 120px;
  font-weight: 800;
  line-height: 1.18;
  text-align: left;
  letter-spacing: -0.02em;
  background: linear-gradient(130deg, var(--p) 0%, var(--s) 45%, #3B82F6 65%, var(--p) 100%);
  background-size: 200% auto;
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: textShine 4s linear infinite, slideFromRight 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) 0.9s forwards;
  opacity: 0;
}

.glitch-title span {
  display: inline-block;
  position: relative;
  background: linear-gradient(135deg, #3B82F6, #1E40AF);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: pulseGlowWord 2.2s ease-in-out infinite;
  font-weight: 900;
}

/* tagline */
.tagline {
  font-size: 52px;
  font-weight: 500;
  color: var(--tm);
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(4px);
  padding: 14px 50px;
  border-radius: 80px;
  display: inline-block;
  font-family: 'Sora', sans-serif;
  animation: slideFromRight 0.85s cubic-bezier(0.2, 0.9, 0.4, 1.1) 1.1s forwards;
  opacity: 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.03);
}

/* =====================
   KEYFRAMES
   ===================== */

/* Image : entre par la gauche */
@keyframes slideFromLeft {
  0% {
    opacity: 0;
    transform: translateX(-280px) scale(0.92);
    filter: blur(10px) drop-shadow(0 40px 80px rgba(37,99,235,0.18));
  }
  60% {
    opacity: 1;
    transform: translateX(20px) scale(1.01);
  }
  100% {
    opacity: 1;
    transform: translateX(0) scale(1);
    filter: blur(0) drop-shadow(0 40px 80px rgba(37,99,235,0.18));
  }
}

/* Textes : entrent par la droite */
@keyframes slideFromRight {
  0% {
    opacity: 0;
    transform: translateX(220px) scale(0.94);
    filter: blur(8px);
  }
  60% {
    opacity: 1;
    transform: translateX(-12px) scale(1.01);
  }
  100% {
    opacity: 1;
    transform: translateX(0) scale(1);
    filter: blur(0);
  }
}

@keyframes floatImage {
  0% { transform: translateY(0px) scale(1); }
  100% { transform: translateY(-18px) scale(1.01); }
}

@keyframes floatSoft {
  0% { transform: translateY(0px) rotate(0deg); }
  100% { transform: translateY(-8px) rotate(1deg); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes badgeGlowPulse {
  0% {
    box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.3);
    border-color: rgba(37,99,235,0.5);
  }
  50% {
    box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15), 0 0 0 5px rgba(37,99,235,0.2);
    border-color: rgba(37,99,235,0.9);
  }
  100% {
    box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0);
    border-color: rgba(37,99,235,0.5);
  }
}

@keyframes pulseDot {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--s); }
  50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 0 8px rgba(37,99,235,0.4); }
}

@keyframes textShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

@keyframes pulseGlowWord {
  0%, 100% { text-shadow: 0 0 0px rgba(59,130,246,0); transform: scale(1); }
  50% { text-shadow: 0 0 12px rgba(59,130,246,0.6); transform: scale(1.02); }
}
</style>
</head>
<body>
<div class="grid"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>

<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>

<div class="pulse-ring"></div>

<div class="main-content">

  <!-- COLONNE GAUCHE : image animée depuis la gauche -->
  <div class="col-image">
    <img class="hero-image" src="1.png" alt="Personnage débordé par ses dossiers de transit" />
  </div>

  <!-- SÉPARATEUR -->
  <div class="divider"></div>

  <!-- COLONNE DROITE : textes animés depuis la droite -->
  <div class="col-text">

    <!-- Badge -->
    <div class="badge-problem">
      <div class="pulse-dot"></div>
      <span class="badge-text">LE PROBLÈME</span>
    </div>

    <!-- Horloge SVG -->
    <svg class="motion-svg" width="220" height="220" viewBox="0 0 100 100" style="overflow: visible;">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1E3A8A" />
          <stop offset="100%" stop-color="#3B82F6" />
        </linearGradient>
        <filter id="glowSvg" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feMerge>
            <feMergeNode in="offsetblur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <circle cx="50" cy="50" r="45" stroke="url(#ringGrad)" stroke-width="4.5" fill="rgba(219,234,254,0.4)" filter="url(#glowSvg)" stroke-dasharray="4 3"/>
      <line x1="50" y1="50" x2="50" y2="18" stroke="#1E3A8A" stroke-width="5.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5.5s" repeatCount="indefinite" />
      </line>
      <line x1="50" y1="50" x2="74" y2="50" stroke="#3B82F6" stroke-width="4.2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="0.55s" repeatCount="indefinite" />
      </line>
      <circle cx="50" cy="50" r="6.5" fill="white" stroke="#2563EB" stroke-width="2">
        <animate attributeName="r" values="6;7;6" dur="1.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="50" cy="50" r="3" fill="#2563EB" />
    </svg>

    <!-- Titre -->
    <h1 class="glitch-title">
      Vous perdez du <span>temps</span><br>à suivre vos dossiers<br>de transit ?
    </h1>

    <!-- Tagline -->
    <p class="tagline">
      Suivi de dossiers · Gestion de transit · Visibilité opérationnelle
    </p>

  </div>
</div>

</body>
</html>
