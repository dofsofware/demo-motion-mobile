<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 28</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p-dark: #0F2B6D;
  --s: #2563EB;
  --white: #FFFFFF;
  --white-light: rgba(255,255,255,0.85);
  --white-soft: rgba(255,255,255,0.7);
  --glow: rgba(37, 99, 235, 0.4);
}

body {
  width: 3840px;
  height: 2160px;
  background: linear-gradient(135deg, #0A1A3A 0%, #1E3A8A 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique (blanche très légère) */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}

@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes (blanches/bleues) */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.25;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(59,130,246,0.3), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 70px;
  z-index: 20;
  max-width: 3000px;
  width: 85%;
  position: relative;
  backdrop-filter: blur(2px);
  padding: 60px 0;
}

/* logo */
.logo-container {
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
  animation: scalePopLogo 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards, floatSoft 3s ease-in-out infinite;
  opacity: 0;
  transform-origin: center;
}
.logo-img {
  height: 200px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  transition: transform 0.2s;
}
.logo-img:hover {
  transform: scale(1.02);
}

/* titre principal */
.glitch-title {
  font-family: 'Sora', sans-serif;
  font-size: 120px;
  font-weight: 800;
  line-height: 1.2;
  text-align: center;
  letter-spacing: -0.02em;
  color: white;
  animation: riseGlow 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
  opacity: 0;
  text-shadow: 0 10px 30px rgba(0,0,0,0.3);
  max-width: 2800px;
  margin: 0 auto;
}
.glitch-title span {
  opacity: 0.75;
  font-weight: 700;
}

/* sous-titre */
.subtitle {
  font-size: 64px;
  font-weight: 300;
  color: var(--white-soft);
  text-align: center;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
  padding: 12px 40px;
  border-radius: 80px;
  display: inline-block;
  font-family: 'Sora', sans-serif;
  animation: slideUpFade 0.85s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  opacity: 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* CTA button */
.cta-button {
  background: white;
  border-radius: 30px;
  padding: 40px 120px;
  font-family: 'Sora', sans-serif;
  font-size: 60px;
  font-weight: 800;
  color: #1E3A8A;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 20px 80px rgba(0,0,0,0.2);
  animation: scalePopButton 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  opacity: 0;
  transform-origin: center;
  border: none;
  letter-spacing: 2px;
  backdrop-filter: blur(4px);
}
.cta-button:hover {
  transform: scale(1.05);
  box-shadow: 0 30px 100px rgba(37,99,235,0.4);
  background: linear-gradient(135deg, #ffffff, #F0F5FF);
}

/* barre de progression */
.prog {
  position: absolute;
  bottom: 90px;
  left: 180px;
  right: 180px;
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  overflow: hidden;
  backdrop-filter: blur(2px);
  z-index: 30;
}
.prog-f {
  height: 100%;
  background: linear-gradient(90deg, #ffffff, #60A5FA, #ffffff);
  border-radius: 8px;
  width: 0;
  animation: progFill 5s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
}

/* Keyframes motion */
@keyframes slideDownPop {
  0% {
    opacity: 0;
    transform: translateY(-80px) scale(0.85);
    filter: blur(12px);
  }
  60% {
    opacity: 1;
    transform: translateY(8px) scale(1.02);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes scalePopLogo {
  0% {
    opacity: 0;
    transform: scale(0.2) rotate(-10deg);
    filter: blur(10px);
  }
  50% {
    opacity: 1;
    transform: scale(1.05) rotate(1deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    filter: blur(0);
  }
}

@keyframes scalePopButton {
  0% {
    opacity: 0;
    transform: scale(0.85) translateY(40px);
    filter: blur(8px);
  }
  50% {
    opacity: 1;
    transform: scale(1.02) translateY(-4px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
  }
}

@keyframes riseGlow {
  0% {
    opacity: 0;
    transform: translateY(100px) scale(0.92);
    filter: blur(8px);
  }
  40% {
    opacity: 0.9;
    transform: translateY(-12px) scale(1.01);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes slideUpFade {
  0% {
    opacity: 0;
    transform: translateY(70px) scale(0.95);
    filter: blur(6px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes floatSoft {
  0% {
    transform: translateY(0px) rotate(0deg);
  }
  100% {
    transform: translateY(-8px) rotate(1deg);
  }
}

@keyframes progFill {
  0% { width: 0%; opacity: 0.5; }
  20% { width: 15%; opacity: 1; }
  60% { width: 68%; }
  100% { width: 100%; }
}

/* cercle pulsant central (blanc/bleu) */
.pulse-ring {
  position: absolute;
  width: 1400px;
  height: 1400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0.03) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 6s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes largePulse {
  0% {
    transform: translate(-50%, -50%) scale(0.92);
    opacity: 0.4;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.12);
    opacity: 0.7;
  }
  100% {
    transform: translate(-50%, -50%) scale(0.92);
    opacity: 0.4;
  }
}

/* lignes flottantes */
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}

.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}

@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}

@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}

/* étincelles */
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }

@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #ffffff; }
  30% { opacity: 0.7; transform: scale(1.2); background: #a0c4ff; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

/* ajustements 4K */
@media (max-width: 3840px) {
  .glitch-title { font-size: 110px; }
  .subtitle { font-size: 56px; }
  .cta-button { font-size: 52px; padding: 32px 100px; }
  .logo-img { height: 180px; }
  .main-content { gap: 60px; }
}
.prog, .prog-f { display: none !important; }
</style>
</head>
<body>
<div class="grid"></div>

<!-- orbes flottantes -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- lignes dynamiques -->
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>

<!-- particules -->
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>

<!-- cercle pulsant -->
<div class="pulse-ring"></div>

<div class="main-content">
  <!-- Logo ShipTrack (version blanche) -->
  <div class="logo-container">
    <img class="logo-img" src="logo.png">
  </div>

  <!-- Titre principal -->
  <h1 class="glitch-title">
    Demandez votre <span>démo gratuite</span><br>dès maintenant.
  </h1>

  <!-- sous-titre -->
  <p class="subtitle">
    Contrôlez vos opérations. Maîtrisez vos marges et bien plus.
  </p>

  <!-- CTA Button -->
  <div class="cta-button">
    Commencer maintenant →
  </div>
</div>

<div class="prog">
  <div class="prog-f"></div>
</div>

<!-- logo et compteur supprimés -->
</body>
</html>
