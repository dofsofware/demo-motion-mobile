<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 23</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}

@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal (flex row) */
.main-content {
  display: flex;
  align-items: center;
  gap: 160px;
  z-index: 20;
  padding: 0 240px;
  width: 100%;
  position: relative;
  backdrop-filter: blur(2px);
}

/* colonne gauche */
.left-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 60px;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 18px 56px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideDownPop 0.7s cubic-bezier(0.34, 1.3, 0.55, 1) forwards;
  opacity: 0;
  transform-origin: top center;
  width: fit-content;
}

.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}

.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 2px 5px rgba(37,99,235,0.2);
}

/* titre */
.title {
  font-family: 'Sora', sans-serif;
  font-size: 90px;
  font-weight: 800;
  line-height: 1.1;
  text-align: left;
  background: linear-gradient(130deg, var(--p) 0%, var(--s) 45%, #3B82F6 65%, var(--p) 100%);
  background-size: 200% auto;
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: textShine 4s linear infinite, riseGlow 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
  opacity: 0;
  text-shadow: 0 4px 25px rgba(37,99,235,0.2);
  max-width: 2600px;
}

.title span {
  display: inline-block;
  background: linear-gradient(135deg, #2563EB, #1E3A8A);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: pulseGlowWord 2.2s ease-in-out infinite;
  font-weight: 900;
}

/* colonne droite */
.right-panel {
  flex: 0 0 1000px;
  opacity: 0;
  animation: slideRightPop 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  transform-origin: right center;
}

.finance-card {
  background: rgba(224, 237, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.3);
  border-radius: 40px;
  padding: 60px;
  box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
  position: relative;
  overflow: hidden;
}

.dossier-header {
  font-size: 38px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 40px;
  font-family: 'Sora', sans-serif;
  display: flex;
  align-items: center;
  gap: 15px;
}
.auto-badge {
  font-size: 24px;
  background: rgba(34,197,94,0.15);
  border: 1px solid #22C55E;
  border-radius: 40px;
  padding: 6px 20px;
  color: #16A34A;
  font-weight: 500;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
}

.finance-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 0;
  border-bottom: 2px solid rgba(30, 58, 138, 0.1);
  transition: transform 0.2s ease, background 0.2s;
  border-radius: 20px;
}
.finance-row:last-child {
  border-bottom: none;
}
.row-label {
  font-size: 40px;
  color: var(--p);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 15px;
}
.row-value {
  font-size: 44px;
  font-weight: 700;
  min-width: 260px;
  text-align: right;
}
.value-green { color: #16A34A; }
.value-red { color: #DC2626; }
.value-blue { color: #1D4ED8; }

/* animation flash pour chaque ligne */
.flash-animation {
  animation: rowFlash 0.4s ease-out;
}
@keyframes rowFlash {
  0% { background: rgba(37,99,235,0); transform: scale(1); }
  30% { background: rgba(37,99,235,0.2); transform: scale(1.02); }
  100% { background: rgba(37,99,235,0); transform: scale(1); }
}

/* indicateur de calcul */
.calc-indicator {
  position: absolute;
  bottom: 30px;
  right: 30px;
  font-size: 28px;
  background: rgba(0,0,0,0.05);
  border-radius: 30px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 0.3s;
}
.calc-indicator span {
  width: 12px;
  height: 12px;
  background: #22C55E;
  border-radius: 50%;
  animation: pulseGreen 1s infinite;
}
@keyframes pulseGreen {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(1.2); opacity: 0; }
}

/* Keyframes motion existants */
@keyframes slideDownPop {
  0% { opacity: 0; transform: translateY(-80px) scale(0.85); filter: blur(12px); }
  60% { opacity: 1; transform: translateY(8px) scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

@keyframes slideRightPop {
  0% { opacity: 0; transform: translateX(80px) scale(0.95); filter: blur(10px); }
  60% { opacity: 1; transform: translateX(-8px) scale(1.01); filter: blur(0); }
  100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
}

@keyframes riseGlow {
  0% { opacity: 0; transform: translateY(100px) scale(0.92); filter: blur(8px); }
  40% { opacity: 0.9; transform: translateY(-12px) scale(1.01); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

@keyframes badgeGlowPulse {
  0% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.3); border-color: rgba(37,99,235,0.5); }
  50% { box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15), 0 0 0 5px rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.9); }
  100% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0); border-color: rgba(37,99,235,0.5); }
}

@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--s); }
  50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 0 8px rgba(37,99,235,0.4); }
}

@keyframes textShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

@keyframes pulseGlowWord {
  0%,100% { text-shadow: 0 0 0px rgba(37,99,235,0); transform: scale(1); }
  50% { text-shadow: 0 0 12px rgba(37,99,235,0.6); transform: scale(1.02); }
}

/* éléments décoratifs */
.pulse-ring {
  position: absolute;
  width: 1400px;
  height: 1400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes largePulse {
  0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
}

.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}
@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}
@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

@media (max-width: 3840px) {
  .title { font-size: 80px; }
  .badge-text { font-size: 30px; }
  .badge-problem { padding: 14px 50px; gap: 20px; }
  .left-col { gap: 50px; }
  .right-panel { flex: 0 0 900px; }
  .finance-card { padding: 50px; }
  .row-label, .row-value { font-size: 36px; }
  .dossier-header { font-size: 34px; }
}
.prog, .prog-f { display: none !important; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">
  <div class="left-col">
    <div class="badge-problem">
      <div class="pulse-dot"></div>
      <span class="badge-text">CHARGES ET MARGES</span>
    </div>
    <h1 class="title">
      Charges enregistrées.<br>Marges calculées<br><span>automatiquement.</span>
    </h1>
  </div>

  <div class="right-panel">
    <div class="finance-card">
      <div class="dossier-header">
        Dossier #2847
        <span class="auto-badge" id="autoBadge">⚡ Calcul auto</span>
      </div>
      <div class="finance-row" id="rowRevenues">
        <span class="row-label">📊 Revenus</span>
        <span class="row-value value-green" id="revenuesValue">0 FCFA</span>
      </div>
      <div class="finance-row" id="rowCharges">
        <span class="row-label">📦 Charges</span>
        <span class="row-value value-red" id="chargesValue">0 FCFA</span>
      </div>
      <div class="finance-row" id="rowMargin">
        <span class="row-label">📈 Marge nette</span>
        <span class="row-value value-blue" id="marginValue">0 FCFA (0%)</span>
      </div>
      <div class="calc-indicator" id="calcIndicator">
        <span></span> Calcul automatique en cours...
      </div>
    </div>
  </div>
</div>

<script>
  // Valeurs cibles
  const revenuesTarget = 2400000;
  const chargesTarget = 1680000;
  const marginTarget = revenuesTarget - chargesTarget;
  const marginPercent = ((marginTarget / revenuesTarget) * 100).toFixed(1);

  // Éléments
  const revenuesSpan = document.getElementById('revenuesValue');
  const chargesSpan = document.getElementById('chargesValue');
  const marginSpan = document.getElementById('marginValue');
  const autoBadge = document.getElementById('autoBadge');
  const calcIndicator = document.getElementById('calcIndicator');

  // Fonction d'animation de compteur
  function animateValue(element, start, end, duration, callback) {
    let startTime = null;
    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      const progress = Math.min(1, (timestamp - startTime) / duration);
      const current = Math.floor(start + (end - start) * progress);
      element.innerText = current.toLocaleString('fr-FR') + ' FCFA';
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        element.innerText = end.toLocaleString('fr-FR') + ' FCFA';
        if (callback) callback();
      }
    }
    requestAnimationFrame(step);
  }

  // Animation séquentielle
  setTimeout(() => {
    // Étape 1 : enregistrement des charges (démarre en premier)
    autoBadge.style.opacity = '1';
    calcIndicator.style.opacity = '1';

    // Flash sur la ligne Charges
    const rowCharges = document.getElementById('rowCharges');
    rowCharges.classList.add('flash-animation');
    setTimeout(() => rowCharges.classList.remove('flash-animation'), 400);

    animateValue(chargesSpan, 0, chargesTarget, 1100, () => {
      // Après les charges, enregistrement des revenus
      const rowRevenues = document.getElementById('rowRevenues');
      rowRevenues.classList.add('flash-animation');
      setTimeout(() => rowRevenues.classList.remove('flash-animation'), 400);
      
      animateValue(revenuesSpan, 0, revenuesTarget, 1100, () => {
        // Enfin, calcul de la marge
        const rowMargin = document.getElementById('rowMargin');
        rowMargin.classList.add('flash-animation');
        setTimeout(() => rowMargin.classList.remove('flash-animation'), 400);
        
        // Animation de la marge (compteur)
        let startMargin = 0;
        const endMargin = marginTarget;
        const duration = 1000;
        const startTime = performance.now();
        function animateMargin(now) {
          const elapsed = now - startTime;
          const progress = Math.min(1, elapsed / duration);
          const currentMargin = Math.floor(startMargin + (endMargin - startMargin) * progress);
          marginSpan.innerText = currentMargin.toLocaleString('fr-FR') + ' FCFA (' + marginPercent + '%)';
          if (progress < 1) {
            requestAnimationFrame(animateMargin);
          } else {
            marginSpan.innerText = endMargin.toLocaleString('fr-FR') + ' FCFA (' + marginPercent + '%)';
            // Fin de l'animation : on change le texte de l'indicateur
            calcIndicator.innerHTML = '<span style="background:#22C55E;"></span> Calcul terminé ✓';
            autoBadge.style.background = 'rgba(34,197,94,0.2)';
            autoBadge.style.borderColor = '#22C55E';
            autoBadge.style.color = '#16A34A';
            autoBadge.innerText = '✓ Calcul automatique';
            setTimeout(() => {
              calcIndicator.style.opacity = '0';
            }, 500);
          }
        }
        requestAnimationFrame(animateMargin);
      });
    });
  }, 700); // Délai après apparition de la carte
</script>
</body>
</html>
