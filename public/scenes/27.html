<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 27 (Créative)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
  --red-light: #FEE2E2;
  --red: #DC2626;
  --green-light: #DCFCE7;
  --green: #16A34A;
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}
@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 80px;
  z-index: 20;
  max-width: 3400px;
  width: 90%;
  position: relative;
  backdrop-filter: blur(2px);
  padding: 60px 0;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 20px 70px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideDownPop 0.7s cubic-bezier(0.34, 1.3, 0.55, 1) forwards;
  opacity: 0;
  transform-origin: top center;
}
.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}
.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 2px 5px rgba(37,99,235,0.2);
}

/* sous-titre */
.subheading {
  font-family: 'Sora', sans-serif;
  font-size: 90px;
  font-weight: 800;
  color: var(--p);
  text-align: center;
  opacity: 0;
  animation: slideDownPop 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
  animation-delay: 0.3s;
  max-width: 2800px;
  line-height: 1.2;
}

/* cartes */
.cards-container {
  display: flex;
  gap: 60px;
  justify-content: center;
  flex-wrap: wrap;
}
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  border-radius: 50px;
  padding: 50px 60px;
  width: 500px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
  opacity: 0;
  animation: cardRise 0.8s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
}
.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 30px 50px -15px rgba(0,0,0,0.2);
}
.card-negative {
  background: rgba(254, 226, 226, 0.7);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(220, 38, 38, 0.4);
}
.card-positive {
  background: rgba(220, 252, 231, 0.7);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(34, 197, 94, 0.4);
}
.card-icon {
  font-size: 100px;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
  transition: transform 0.2s ease;
}
.card:hover .card-icon {
  transform: scale(1.05);
}
.card-title {
  font-family: 'Sora', sans-serif;
  font-size: 48px;
  font-weight: 700;
  text-align: center;
  letter-spacing: -0.01em;
}
.card-negative .card-title {
  background: linear-gradient(135deg, #991B1B, #DC2626);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}
.card-positive .card-title {
  background: linear-gradient(135deg, #15803D, #22C55E);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}
/* zone d'animation interne */
.card-indicator {
  width: 100%;
  text-align: center;
  margin-top: 10px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
/* éléments d'animation */
.big-number {
  font-size: 64px;
  font-weight: 800;
  line-height: 1;
}
.progress-bar-container {
  width: 100%;
  background: rgba(0,0,0,0.1);
  border-radius: 30px;
  height: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 30px;
  transition: width 1.2s cubic-bezier(0.2, 0.9, 0.4, 1);
}
.gauge {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(var(--green) 0deg, #e0e0e0 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
  color: var(--p);
  margin-bottom: 10px;
  transition: background 0.5s;
}
.particle-effect {
  position: relative;
  overflow: visible;
}
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  pointer-events: none;
  animation: particleFly 0.8s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 0.8; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}
/* délais d'animation des cartes */
.card:nth-child(1) { animation-delay: 0.5s; }
.card:nth-child(2) { animation-delay: 0.8s; }
.card:nth-child(3) { animation-delay: 2.1s; }
.card:nth-child(4) { animation-delay: 2.4s; }
@keyframes cardRise {
  0% { opacity: 0; transform: translateY(50px) scale(0.92); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* keyframes existants */
@keyframes slideDownPop {
  0% { opacity: 0; transform: translateY(-80px) scale(0.85); filter: blur(12px); }
  60% { opacity: 1; transform: translateY(8px) scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes badgeGlowPulse {
  0% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.3); border-color: rgba(37,99,235,0.5); }
  50% { box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15), 0 0 0 5px rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.9); }
  100% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0); border-color: rgba(37,99,235,0.5); }
}
@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--s); }
  50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 0 8px rgba(37,99,235,0.4); }
}
/* éléments décoratifs */
.pulse-ring {
  position: absolute;
  width: 1400px;
  height: 1400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(37,99,235,0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes largePulse {
  0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
}
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}
@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}
@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}
@media (max-width: 3840px) {
  .subheading { font-size: 80px; }
  .badge-text { font-size: 34px; }
  .badge-problem { padding: 16px 60px; gap: 22px; }
  .main-content { gap: 70px; }
  .card { width: 450px; padding: 40px 50px; }
  .card-icon { font-size: 90px; }
  .card-title { font-size: 42px; }
  .big-number { font-size: 56px; }
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">RÉSULTATS</span>
  </div>
  <h2 class="subheading">Les résultats parlent d'eux-mêmes :</h2>

  <div class="cards-container">
    <!-- Carte 1 : Moins d'erreurs -->
    <div class="card card-negative" id="cardErrors">
      <div class="card-icon">📉</div>
      <div class="card-title">Moins d'erreurs</div>
      <div class="card-indicator">
        <div class="big-number" id="errorPercent">0%</div>
        <div class="progress-bar-container">
          <div class="progress-fill" id="errorFill" style="background: #DC2626;"></div>
        </div>
        <div style="font-size: 24px;">taux d'erreur réduit</div>
      </div>
    </div>

    <!-- Carte 2 : Moins de retards -->
    <div class="card card-negative" id="cardDelays">
      <div class="card-icon">⏱️</div>
      <div class="card-title">Moins de retards</div>
      <div class="card-indicator">
        <div class="big-number" id="delayPercent">0%</div>
        <div class="progress-bar-container">
          <div class="progress-fill" id="delayFill" style="background: #F59E0B;"></div>
        </div>
        <div style="font-size: 24px;">retards évités</div>
      </div>
    </div>

    <!-- Carte 3 : Plus de contrôle -->
    <div class="card card-positive" id="cardControl">
      <div class="card-icon">🎛️</div>
      <div class="card-title">Plus de contrôle</div>
      <div class="card-indicator">
        <div class="gauge" id="controlGauge">0%</div>
        <div style="font-size: 24px;">visibilité totale</div>
      </div>
    </div>

    <!-- Carte 4 : Plus de profit -->
    <div class="card card-positive" id="cardProfit">
      <div class="card-icon">💰</div>
      <div class="card-title">Plus de profit</div>
      <div class="card-indicator">
        <div class="big-number" id="profitValue">0 FCFA</div>
        <div class="progress-bar-container">
          <div class="progress-fill" id="profitFill" style="background: #22C55E;"></div>
        </div>
        <div style="font-size: 24px;">marge supplémentaire</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Délais des cartes (apparition)
  const cardDelays = [500, 800, 1100, 1400];

  // Animation pour chaque carte (déclenchée après apparition)
  function animateErrors() {
    const target = 87; // % de réduction d'erreurs
    let current = 0;
    const elem = document.getElementById('errorPercent');
    const fill = document.getElementById('errorFill');
    const interval = setInterval(() => {
      current += 1;
      if (current >= target) {
        current = target;
        clearInterval(interval);
        elem.innerText = current + '%';
        fill.style.width = current + '%';
        // particules de succès
        createParticles(document.getElementById('cardErrors'), '#DC2626');
      } else {
        elem.innerText = current + '%';
        fill.style.width = current + '%';
      }
    }, 15);
  }

  function animateDelays() {
    const target = 72; // % de retards en moins
    let current = 0;
    const elem = document.getElementById('delayPercent');
    const fill = document.getElementById('delayFill');
    const interval = setInterval(() => {
      current += 1;
      if (current >= target) {
        current = target;
        clearInterval(interval);
        elem.innerText = current + '%';
        fill.style.width = current + '%';
        createParticles(document.getElementById('cardDelays'), '#F59E0B');
      } else {
        elem.innerText = current + '%';
        fill.style.width = current + '%';
      }
    }, 15);
  }

  function animateControl() {
    const target = 94; // % de contrôle atteint
    let current = 0;
    const gauge = document.getElementById('controlGauge');
    const interval = setInterval(() => {
      current += 1;
      if (current >= target) {
        current = target;
        clearInterval(interval);
        gauge.style.background = `conic-gradient(#22C55E 0deg ${(current / 100) * 360}deg, #e0e0e0 ${(current / 100) * 360}deg)`;
        gauge.innerText = current + '%';
        createParticles(document.getElementById('cardControl'), '#22C55E');
      } else {
        gauge.style.background = `conic-gradient(#22C55E 0deg ${(current / 100) * 360}deg, #e0e0e0 ${(current / 100) * 360}deg)`;
        gauge.innerText = current + '%';
      }
    }, 15);
  }

  function animateProfit() {
    const target = 2450000; // FCFA
    let current = 0;
    const elem = document.getElementById('profitValue');
    const fill = document.getElementById('profitFill');
    const step = target / 60;
    const interval = setInterval(() => {
      current += step;
      if (current >= target) {
        current = target;
        clearInterval(interval);
        elem.innerText = Math.floor(current).toLocaleString('fr-FR') + ' FCFA';
        fill.style.width = '100%';
        createParticles(document.getElementById('cardProfit'), '#22C55E');
      } else {
        elem.innerText = Math.floor(current).toLocaleString('fr-FR') + ' FCFA';
        fill.style.width = (current / target) * 100 + '%';
      }
    }, 20);
  }

  function createParticles(card, color) {
    const rect = card.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const angle = Math.random() * Math.PI * 2;
      const distance = 30 + Math.random() * 100;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;
      particle.style.setProperty('--dx', dx + 'px');
      particle.style.setProperty('--dy', dy + 'px');
      particle.style.left = centerX + 'px';
      particle.style.top = centerY + 'px';
      particle.style.background = color;
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 800);
    }
  }

  // Déclencher les animations après les délais des cartes + un petit délai pour laisser la carte s'afficher
  setTimeout(animateErrors, cardDelays[0] + 200);
  setTimeout(animateDelays, cardDelays[1] + 200);
  setTimeout(animateControl, cardDelays[2] + 200);
  setTimeout(animateProfit, cardDelays[3] + 200);
</script>
</body>
</html>
