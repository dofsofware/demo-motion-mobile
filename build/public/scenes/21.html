<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 21</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --p: #0F2B6D;
  --s: #2563EB;
  --bg: #F5F9FF;
  --acc: #E0EDFF;
  --td: #0A1A3A;
  --tm: #2C3E66;
  --glow: rgba(37, 99, 235, 0.3);
}

body {
  width: 3840px;
  height: 2160px;
  background: radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family: 'Sora', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grille dynamique */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(30, 58, 138, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 58, 138, 0.045) 1px, transparent 1px);
  background-size: 140px 140px;
  animation: gridShift 18s linear infinite;
  pointer-events: none;
}
@keyframes gridShift {
  0% { background-position: 0 0; }
  100% { background-position: 140px 140px; }
}

/* orbes flottantes */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
  pointer-events: none;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
  top: 10%;
  left: -10%;
  animation-duration: 22s;
}
.orb-2 {
  width: 1100px;
  height: 1100px;
  background: radial-gradient(circle, rgba(15,43,109,0.18), transparent);
  bottom: -20%;
  right: -15%;
  animation-duration: 26s;
  animation-direction: alternate-reverse;
}
.orb-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
  top: 50%;
  left: 70%;
  animation-duration: 18s;
  filter: blur(70px);
}
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 8%) scale(1.1); }
}

/* conteneur principal */
.main-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 70px;
  z-index: 20;
  max-width: 3000px;
  width: 85%;
  position: relative;
  backdrop-filter: blur(2px);
  padding: 60px 0;
}

/* badge */
.badge-problem {
  display: inline-flex;
  align-items: center;
  gap: 28px;
  background: rgba(224, 237, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(37, 99, 235, 0.5);
  border-radius: 120px;
  padding: 20px 70px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 0 0 0 rgba(37, 99, 235, 0.2);
  animation: badgeGlowPulse 2.8s infinite, slideDownPop 0.7s cubic-bezier(0.34, 1.3, 0.55, 1) forwards;
  opacity: 0;
  transform-origin: top center;
}
.pulse-dot {
  width: 20px;
  height: 20px;
  background: var(--s);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--s);
  animation: pulseDot 1.6s ease-in-out infinite;
}
.badge-text {
  font-family: 'Sora', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #1E3A8A, #2563EB);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* icône animée */
.icon-benefit {
  width: 260px;
  height: 260px;
  background: rgba(224, 237, 255, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 120px;
  border: 3px solid rgba(37, 99, 235, 0.4);
  box-shadow: 0 25px 40px -12px rgba(0,0,0,0.15);
  animation: scalePopSpin 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards, floatSoft 3s ease-in-out infinite;
  opacity: 0;
  transform-origin: center;
}

/* titre */
.glitch-title {
  font-family: 'Sora', sans-serif;
  font-size: 110px;
  font-weight: 800;
  line-height: 1.2;
  text-align: center;
  letter-spacing: -0.02em;
  background: linear-gradient(130deg, var(--p) 0%, var(--s) 45%, #3B82F6 65%, var(--p) 100%);
  background-size: 200% auto;
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: textShine 4s linear infinite, riseGlow 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
  opacity: 0;
  max-width: 2800px;
  margin: 0 auto;
}
.glitch-title span {
  display: inline-block;
  background: linear-gradient(135deg, #2563EB, #1E3A8A);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: pulseGlowWord 2.2s ease-in-out infinite;
  font-weight: 900;
}

/* sous-titre */
.subtitle {
  font-size: 52px;
  font-weight: 300;
  color: var(--tm);
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(4px);
  padding: 12px 40px;
  border-radius: 80px;
  display: inline-block;
  font-family: 'Sora', sans-serif;
  font-weight: 500;
  animation: slideUpFade 0.85s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  opacity: 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.02);
}

/* SECTION APPELS (nouveau) */
.calls-section {
  width: 100%;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
}
.calls-container {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}
.call-item {
  background: white;
  border-radius: 60px;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 40px;
  font-weight: 600;
  color: var(--p);
  box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
  border: 2px solid rgba(37,99,235,0.2);
  backdrop-filter: blur(4px);
  opacity: 0;
  transform: translateY(30px) scale(0.9);
  animation: callEntry 0.5s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
}
.call-item .call-icon {
  font-size: 48px;
}
.call-item .call-number {
  font-size: 36px;
  font-weight: 700;
  color: var(--s);
}
/* délais séquentiels */
.call-item:nth-child(1) { animation-delay: 0.1s; }
.call-item:nth-child(2) { animation-delay: 0.2s; }
.call-item:nth-child(3) { animation-delay: 0.3s; }
.call-item:nth-child(4) { animation-delay: 0.4s; }
.call-item:nth-child(5) { animation-delay: 0.5s; }

@keyframes callEntry {
  0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* état de suppression */
.call-item.removed {
  animation: crossOutFade 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  pointer-events: none;
}
@keyframes crossOutFade {
  0% {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  40% {
    opacity: 0.8;
    transform: scale(1.05) rotate(-2deg);
    background: #FFEDED;
    border-color: #EF4444;
  }
  100% {
    opacity: 0;
    transform: scale(0.8) rotate(-10deg);
    filter: blur(4px);
    visibility: hidden;
  }
}

/* compteur et message final */
.counter-info {
  font-size: 36px;
  font-weight: 600;
  color: var(--tm);
  background: rgba(224, 237, 255, 0.6);
  backdrop-filter: blur(8px);
  padding: 12px 32px;
  border-radius: 80px;
  margin-top: 20px;
  opacity: 0;
  animation: fadeInUp 0.5s ease 1.2s forwards;
}
.counter-info span {
  font-size: 48px;
  font-weight: 800;
  color: var(--s);
}
.final-message {
  font-size: 40px;
  font-weight: 600;
  color: #22C55E;
  background: rgba(34,197,94,0.1);
  padding: 12px 32px;
  border-radius: 80px;
  backdrop-filter: blur(4px);
  display: inline-flex;
  align-items: center;
  gap: 15px;
  opacity: 0;
  transform: scale(0.9);
  animation: finalPop 0.6s cubic-bezier(0.2, 0.9, 0.4, 1) 3.2s forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes finalPop {
  0% { opacity: 0; transform: scale(0.8); filter: blur(4px); }
  80% { opacity: 1; transform: scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: scale(1); }
}

/* keyframes existants */
@keyframes slideDownPop {
  0% { opacity: 0; transform: translateY(-80px) scale(0.85); filter: blur(12px); }
  60% { opacity: 1; transform: translateY(8px) scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes scalePopSpin {
  0% { opacity: 0; transform: scale(0.2) rotate(-120deg); filter: blur(10px); }
  50% { opacity: 1; transform: scale(1.08) rotate(3deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
}
@keyframes riseGlow {
  0% { opacity: 0; transform: translateY(100px) scale(0.92); filter: blur(8px); }
  40% { opacity: 0.9; transform: translateY(-12px) scale(1.01); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes slideUpFade {
  0% { opacity: 0; transform: translateY(70px) scale(0.95); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes badgeGlowPulse {
  0% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.3); border-color: rgba(37,99,235,0.5); }
  50% { box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15), 0 0 0 5px rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.9); }
  100% { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0); border-color: rgba(37,99,235,0.5); }
}
@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--s); }
  50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 0 8px rgba(37,99,235,0.4); }
}
@keyframes textShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
@keyframes pulseGlowWord {
  0%,100% { text-shadow: 0 0 0px rgba(37,99,235,0); transform: scale(1); }
  50% { text-shadow: 0 0 12px rgba(37,99,235,0.6); transform: scale(1.02); }
}
@keyframes floatSoft {
  0% { transform: translateY(0px) rotate(0deg); }
  100% { transform: translateY(-8px) rotate(1deg); }
}

/* éléments décoratifs existants (inchangés) */
.pulse-ring {
  position: absolute;
  width: 1000px;
  height: 1000px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(37,99,235,0.02) 60%, transparent 85%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: largePulse 5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes largePulse {
  0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
}
.floating-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(37,99,235,0.3), transparent);
  top: 35%;
  left: -50%;
  transform: rotate(8deg);
  animation: driftLine 12s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.floating-line2 {
  top: 70%;
  transform: rotate(-5deg);
  animation: driftLineReverse 14s linear infinite;
  width: 180%;
}
@keyframes driftLine {
  0% { transform: translateX(-30%) rotate(8deg); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { transform: translateX(40%) rotate(8deg); opacity: 0; }
}
@keyframes driftLineReverse {
  0% { transform: translateX(40%) rotate(-5deg); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.4; }
  100% { transform: translateX(-50%) rotate(-5deg); opacity: 0; }
}
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--s);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 3s ease-in-out infinite;
  pointer-events: none;
  filter: blur(1px);
}
.spark-1 { top: 20%; left: 15%; animation-delay: 0s; width: 10px; height: 10px; }
.spark-2 { top: 65%; left: 85%; animation-delay: 0.7s; }
.spark-3 { top: 80%; left: 30%; animation-delay: 1.2s; width: 8px; height: 8px;}
.spark-4 { top: 40%; left: 72%; animation-delay: 0.3s; }
.spark-5 { top: 15%; left: 88%; animation-delay: 1.8s; }
@keyframes sparkle {
  0% { opacity: 0; transform: scale(0); background: #60A5FA; }
  30% { opacity: 0.7; transform: scale(1.2); background: #3B82F6; }
  70% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

/* responsive */
@media (max-width: 3840px) {
  .glitch-title { font-size: 100px; }
  .subtitle { font-size: 48px; }
  .badge-text { font-size: 34px; }
  .badge-problem { padding: 16px 60px; gap: 22px; }
  .main-content { gap: 60px; }
  .icon-benefit { width: 240px; height: 240px; font-size: 110px; border-radius: 45px; }
  .call-item { padding: 16px 32px; font-size: 32px; }
  .call-item .call-icon { font-size: 40px; }
  .call-item .call-number { font-size: 32px; }
  .counter-info { font-size: 32px; }
  .final-message { font-size: 36px; }
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="floating-line"></div>
<div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div>
<div class="spark spark-2"></div>
<div class="spark spark-3"></div>
<div class="spark spark-4"></div>
<div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">BÉNÉFICE DIRECT</span>
  </div>

  <div class="icon-benefit">
    📵
  </div>

  <h1 class="glitch-title">
    Et vous recevez<br><span>moins d'appels</span> inutiles.
  </h1>

  <!-- Section appels entrants animés -->
  <div class="calls-section">
    <div class="calls-container" id="callsContainer">
      <div class="call-item">
        <div class="call-icon">📞</div>
        <div class="call-number">+221 77 6 12 34 56</div>
      </div>
      <div class="call-item">
        <div class="call-icon">📞</div>
        <div class="call-number">+221 77 798 76 54</div>
      </div>
      <div class="call-item">
        <div class="call-icon">📞</div>
        <div class="call-number">+221 78 645 67 89</div>
      </div>
      <div class="call-item">
        <div class="call-icon">📞</div>
        <div class="call-number">+221 70 712 34 56</div>
      </div>
      <div class="call-item">
        <div class="call-icon">📞</div>
        <div class="call-number">+221 76 678 90 12</div>
      </div>
    </div>

    <div class="counter-info" id="counterInfo">
      📞 Appels entrants : <span id="callCount">5</span>
    </div>

    <div class="final-message" id="finalMessage" style="display: none;">
      ✅ + de sérénité, - de perturbations
    </div>
  </div>
</div>

<script>
  // Animation de suppression séquentielle des appels
  const calls = document.querySelectorAll('.call-item');
  const callCountSpan = document.getElementById('callCount');
  const finalMsg = document.getElementById('finalMessage');
  let remaining = calls.length;

  // Fonction pour supprimer les appels un par un
  function removeNextCall(index) {
    if (index >= calls.length) return;
    const call = calls[index];
    call.classList.add('removed');
    remaining--;
    callCountSpan.innerText = remaining;
    if (remaining === 0) {
      // Afficher le message final
      finalMsg.style.display = 'inline-flex';
      finalMsg.style.animation = 'finalPop 0.6s cubic-bezier(0.2,0.9,0.4,1) forwards';
    }
    // Programmer la suppression suivante
    if (index + 1 < calls.length) {
      setTimeout(() => removeNextCall(index + 1), 500);
    }
  }

  // Attendre que les appels soient apparus puis les supprimer
  setTimeout(() => {
    removeNextCall(0);
  }, 500); // après 2.2s (les 5 appels sont apparus à 1.0s)
</script>
</body>
</html>
