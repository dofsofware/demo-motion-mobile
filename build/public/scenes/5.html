<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 05</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

:root {
  --p:#0F2B6D; --s:#DC2626; --s-light:#EF4444; --bg:#F5F9FF; --acc:#FFEDED; --td:#0A1A3A; --tm:#2C3E66; --glow:rgba(220,38,38,0.3);
}

body {
  width:3840px; height:2160px;
  background:radial-gradient(circle at 50% 30%, #FFF5F5 0%, var(--bg) 100%);
  font-family:'Sora',sans-serif; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
}

.grid { position:absolute; inset:0; background-image:linear-gradient(rgba(30,58,138,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,138,.045) 1px,transparent 1px); background-size:140px 140px; animation:gridShift 18s linear infinite; pointer-events:none; }
@keyframes gridShift { 0% { background-position:0 0; } 100% { background-position:140px 140px; } }

.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.4; pointer-events:none; animation:orbFloat 14s ease-in-out infinite alternate; }
.orb-1 { width:800px; height:800px; background:radial-gradient(circle,rgba(220,38,38,0.2),transparent); top:10%; left:-10%; animation-duration:22s; }
.orb-2 { width:1100px; height:1100px; background:radial-gradient(circle,rgba(15,43,109,0.18),transparent); bottom:-20%; right:-15%; animation-duration:26s; animation-direction:alternate-reverse; }
.orb-3 { width:500px; height:500px; background:radial-gradient(circle,rgba(220,38,38,0.25),transparent); top:50%; left:70%; animation-duration:18s; filter:blur(70px); }
@keyframes orbFloat { 0% { transform:translate(0,0) scale(1); } 100% { transform:translate(5%,8%) scale(1.1); } }

.floating-line { position:absolute; width:200%; height:2px; background:linear-gradient(90deg,transparent,rgba(220,38,38,0.3),transparent); top:35%; left:-50%; transform:rotate(8deg); animation:driftLine 12s linear infinite; pointer-events:none; z-index:1; }
.floating-line2 { top:70%; transform:rotate(-5deg); animation:driftLineReverse 14s linear infinite; width:180%; }
@keyframes driftLine { 0% { transform:translateX(-30%) rotate(8deg); opacity:0; } 20% { opacity:0.5; } 80% { opacity:0.5; } 100% { transform:translateX(40%) rotate(8deg); opacity:0; } }
@keyframes driftLineReverse { 0% { transform:translateX(40%) rotate(-5deg); opacity:0; } 20% { opacity:0.4; } 80% { opacity:0.4; } 100% { transform:translateX(-50%) rotate(-5deg); opacity:0; } }

.spark { position:absolute; width:6px; height:6px; background:var(--s); border-radius:50%; opacity:0; animation:sparkle 3s ease-in-out infinite; pointer-events:none; filter:blur(1px); }
.spark-1 { top:20%; left:15%; animation-delay:0s; width:10px; height:10px; }
.spark-2 { top:65%; left:85%; animation-delay:0.7s; }
.spark-3 { top:80%; left:30%; animation-delay:1.2s; width:8px; height:8px; }
.spark-4 { top:40%; left:72%; animation-delay:0.3s; }
.spark-5 { top:15%; left:88%; animation-delay:1.8s; }
@keyframes sparkle { 0% { opacity:0; transform:scale(0); background:#F87171; } 30% { opacity:0.7; transform:scale(1.2); background:#EF4444; } 70% { opacity:0.4; transform:scale(0.8); } 100% { opacity:0; transform:scale(0); } }

.pulse-ring { position:absolute; width:1200px; height:1200px; border-radius:50%; background:radial-gradient(circle,rgba(220,38,38,0.08) 0%,rgba(220,38,38,0.02) 60%,transparent 85%); top:50%; left:50%; transform:translate(-50%,-50%); animation:largePulse 5s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes largePulse { 0% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } 50% { transform:translate(-50%,-50%) scale(1.12); opacity:0.85; } 100% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } }

/* =====================
   CONTENEUR PRINCIPAL
   ===================== */
.main-content {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:80px; z-index:20; max-width:3000px; width:85%; position:relative; padding:60px 0;
}

/* ---- BADGE : entre depuis la droite ---- */
.badge-problem {
  display:inline-flex; align-items:center; gap:28px;
  background:rgba(255,237,237,0.75); backdrop-filter:blur(12px);
  border:2px solid rgba(220,38,38,0.5); border-radius:120px; padding:20px 70px;
  opacity:0;
  animation:
    slideFromRight 0.75s cubic-bezier(0.22,1,0.36,1) forwards,
    badgeGlowPulse 2.8s 0.75s infinite;
}

.pulse-dot { width:20px; height:20px; background:var(--s); border-radius:50%; box-shadow:0 0 12px var(--s); animation:pulseDot 1.6s ease-in-out infinite; }

.badge-text { font-family:'Sora',sans-serif; font-size:38px; font-weight:700; letter-spacing:6px; text-transform:uppercase; background:linear-gradient(135deg,#991B1B,#DC2626); background-clip:text; -webkit-background-clip:text; color:transparent; }

/* ---- SVG : entre depuis la droite ---- */
.motion-svg {
  filter:drop-shadow(0 10px 15px rgba(0,0,0,0.1));
  opacity:0;
  animation:
    slideFromRight 0.82s cubic-bezier(0.22,1,0.36,1) 0.15s forwards,
    floatSoft 3s ease-in-out 1s infinite alternate;
}

/* ---- TITRE : entre depuis la droite ---- */
.glitch-title {
  font-family:'Sora',sans-serif;
  font-size:150px; font-weight:800; line-height:1.15; text-align:center;
  letter-spacing:-0.02em;
  background:linear-gradient(130deg,var(--p) 0%,#991B1B 35%,var(--s) 65%,#4A0404 100%);
  background-size:200% auto;
  background-clip:text; -webkit-background-clip:text; color:transparent;
  opacity:0;
  animation:
    textShine 4s linear infinite,
    slideFromRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.28s forwards;
  max-width:2800px; margin:0 auto;
}

.glitch-title span {
  display:inline-block; position:relative;
  background:linear-gradient(135deg,#EF4444,#B91C1C);
  background-clip:text; -webkit-background-clip:text; color:transparent;
  animation:pulseGlowWord 2.2s ease-in-out infinite;
  font-weight:900; letter-spacing:-0.01em;
}

/* =====================
   KEYFRAMES
   ===================== */
@keyframes slideFromRight {
  0% {
    opacity:0;
    transform:translateX(300px) scale(0.92);
    filter:blur(10px);
  }
  60% {
    opacity:1;
    transform:translateX(-18px) scale(1.01);
    filter:blur(0);
  }
  80% {
    transform:translateX(6px) scale(0.995);
  }
  100% {
    opacity:1;
    transform:translateX(0) scale(1);
    filter:blur(0);
  }
}

@keyframes floatSoft {
  0%   { transform:translateY(0px) rotate(0deg); }
  100% { transform:translateY(-8px) rotate(1deg); }
}

@keyframes badgeGlowPulse {
  0%   { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(220,38,38,0.3); border-color:rgba(220,38,38,0.5); }
  50%  { box-shadow:0 20px 35px -8px rgba(0,0,0,0.15),0 0 0 5px rgba(220,38,38,0.2); border-color:rgba(220,38,38,0.9); }
  100% { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(220,38,38,0); border-color:rgba(220,38,38,0.5); }
}

@keyframes pulseDot {
  0%,100% { transform:scale(1); opacity:1; box-shadow:0 0 0 0 var(--s); }
  50%      { transform:scale(1.2); opacity:0.9; box-shadow:0 0 0 8px rgba(220,38,38,0.4); }
}

@keyframes textShine {
  0%   { background-position:0% 50%; }
  100% { background-position:200% 50%; }
}

@keyframes pulseGlowWord {
  0%,100% { text-shadow:0 0 0px rgba(220,38,38,0); transform:scale(1); }
  50%      { text-shadow:0 0 12px rgba(220,38,38,0.6); transform:scale(1.02); }
}

/* ajustements 4K */
@media (max-width:3840px) {
  .glitch-title { font-size:130px; }
  .badge-text { font-size:34px; }
  .badge-problem { padding:16px 60px; gap:22px; }
  .main-content { gap:70px; }
}
.prog, .prog-f { display:none !important; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="floating-line"></div><div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div><div class="spark spark-2"></div><div class="spark spark-3"></div><div class="spark spark-4"></div><div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">

  <!-- Badge -->
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">PROBLÈME 2/3</span>
  </div>

  <!-- SVG icon : alerte / retard -->
  <svg class="motion-svg" width="260" height="260" viewBox="0 0 100 100" style="overflow:visible;">
    <defs>
      <linearGradient id="ringGrad05" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#991B1B"/>
        <stop offset="100%" stop-color="#DC2626"/>
      </linearGradient>
      <filter id="glowSvg05" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feMerge><feMergeNode in="offsetblur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="50" cy="50" r="45" fill="rgba(254,226,226,0.6)" stroke="url(#ringGrad05)" stroke-width="3.5" filter="url(#glowSvg05)"/>
    <polygon points="50,20 80,75 20,75" fill="rgba(220,38,38,0.2)" stroke="#DC2626" stroke-width="4" stroke-linejoin="round"/>
    <rect x="47" y="40" width="6" height="28" fill="#DC2626" rx="2"/>
    <circle cx="50" cy="72" r="4" fill="#DC2626"/>
    <line x1="30" y1="85" x2="70" y2="85" stroke="#DC2626" stroke-width="3" stroke-dasharray="5 3">
      <animate attributeName="stroke-dashoffset" values="0;16;0" dur="1s" repeatCount="indefinite"/>
    </line>
  </svg>

  <!-- Titre -->
  <h1 class="glitch-title">
    Vous subissez<br>des <span>retards</span>
  </h1>

</div>
</body>
</html>
