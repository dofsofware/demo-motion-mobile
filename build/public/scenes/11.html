<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShipTrack – Motion Graphic Scene 11</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

:root {
  --p:#0F2B6D; --s:#2563EB; --bg:#F5F9FF; --acc:#E0EDFF; --td:#0A1A3A; --tm:#2C3E66;
}

body {
  width:3840px; height:2160px;
  background:radial-gradient(circle at 50% 30%, #F0F5FF 0%, var(--bg) 100%);
  font-family:'Sora',sans-serif; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
}

.grid { position:absolute; inset:0; background-image:linear-gradient(rgba(30,58,138,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,138,.045) 1px,transparent 1px); background-size:140px 140px; animation:gridShift 18s linear infinite; pointer-events:none; }
@keyframes gridShift { 0% { background-position:0 0; } 100% { background-position:140px 140px; } }

.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.4; pointer-events:none; animation:orbFloat 14s ease-in-out infinite alternate; }
.orb-1 { width:800px; height:800px; background:radial-gradient(circle,rgba(37,99,235,0.2),transparent); top:10%; left:-10%; animation-duration:22s; }
.orb-2 { width:1100px; height:1100px; background:radial-gradient(circle,rgba(15,43,109,0.18),transparent); bottom:-20%; right:-15%; animation-duration:26s; animation-direction:alternate-reverse; }
.orb-3 { width:500px; height:500px; background:radial-gradient(circle,rgba(37,99,235,0.25),transparent); top:50%; left:70%; animation-duration:18s; filter:blur(70px); }
@keyframes orbFloat { 0% { transform:translate(0,0) scale(1); } 100% { transform:translate(5%,8%) scale(1.1); } }

.floating-line { position:absolute; width:200%; height:2px; background:linear-gradient(90deg,transparent,rgba(37,99,235,0.3),transparent); top:35%; left:-50%; transform:rotate(8deg); animation:driftLine 12s linear infinite; pointer-events:none; z-index:1; }
.floating-line2 { top:70%; transform:rotate(-5deg); animation:driftLineReverse 14s linear infinite; width:180%; }
@keyframes driftLine { 0% { transform:translateX(-30%) rotate(8deg); opacity:0; } 20% { opacity:0.5; } 80% { opacity:0.5; } 100% { transform:translateX(40%) rotate(8deg); opacity:0; } }
@keyframes driftLineReverse { 0% { transform:translateX(40%) rotate(-5deg); opacity:0; } 20% { opacity:0.4; } 80% { opacity:0.4; } 100% { transform:translateX(-50%) rotate(-5deg); opacity:0; } }

.spark { position:absolute; width:6px; height:6px; background:var(--s); border-radius:50%; opacity:0; animation:sparkle 3s ease-in-out infinite; pointer-events:none; filter:blur(1px); }
.spark-1 { top:20%; left:15%; animation-delay:0s; width:10px; height:10px; }
.spark-2 { top:65%; left:85%; animation-delay:0.7s; }
.spark-3 { top:80%; left:30%; animation-delay:1.2s; width:8px; height:8px; }
.spark-4 { top:40%; left:72%; animation-delay:0.3s; }
.spark-5 { top:15%; left:88%; animation-delay:1.8s; }
@keyframes sparkle { 0% { opacity:0; transform:scale(0); background:#60A5FA; } 30% { opacity:0.7; transform:scale(1.2); background:#3B82F6; } 70% { opacity:0.4; transform:scale(0.8); } 100% { opacity:0; transform:scale(0); } }

.pulse-ring { position:absolute; width:1200px; height:1200px; border-radius:50%; background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,rgba(37,99,235,0.02) 60%,transparent 85%); top:50%; left:50%; transform:translate(-50%,-50%); animation:largePulse 5s ease-in-out infinite; pointer-events:none; z-index:0; }
@keyframes largePulse { 0% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } 50% { transform:translate(-50%,-50%) scale(1.12); opacity:0.85; } 100% { transform:translate(-50%,-50%) scale(0.92); opacity:0.5; } }

/* =====================
   CONTENEUR PRINCIPAL
   ===================== */
.main-content {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:90px; z-index:20; max-width:3200px; width:88%; position:relative; padding:60px 0;
}

/* ---- BADGE ---- */
.badge-problem {
  display:inline-flex; align-items:center; gap:28px;
  background:rgba(224,237,255,0.75); backdrop-filter:blur(12px);
  border:2px solid rgba(37,99,235,0.5); border-radius:120px; padding:20px 70px;
  opacity:0;
  animation:
    slideDownPop 0.7s cubic-bezier(0.34,1.3,0.55,1) forwards,
    badgeGlowPulse 2.8s 0.7s infinite;
}
.pulse-dot { width:20px; height:20px; background:var(--s); border-radius:50%; box-shadow:0 0 12px var(--s); animation:pulseDot 1.6s ease-in-out infinite; }
.badge-text { font-family:'Sora',sans-serif; font-size:38px; font-weight:700; letter-spacing:6px; text-transform:uppercase; background:linear-gradient(135deg,#1E3A8A,#2563EB); background-clip:text; -webkit-background-clip:text; color:transparent; }

/* ---- CARTES CONTAINER ---- */
.cards-container {
  display:flex; gap:80px; align-items:stretch;
}

/* =====================
   CARTE GÉNÉRALE
   ===================== */
.card {
  background:rgba(224,237,255,0.7); backdrop-filter:blur(12px);
  border:2px solid rgba(37,99,235,0.2); border-radius:40px;
  padding:60px 80px;
  display:flex; flex-direction:column; align-items:center; gap:32px;
  min-width:400px; position:relative; overflow:hidden;
  box-shadow:0 15px 30px -10px rgba(0,0,0,0.1);
  /* invisible par défaut */
  opacity:0; transform:translateY(100px) scale(0.88);
}

/* shimmer interne */
.card::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.55) 0%, transparent 60%);
  border-radius:inherit; pointer-events:none;
}

/* Numéro ordinal */
.card-number {
  position:absolute; top:22px; right:32px;
  font-size:32px; font-weight:800; color:rgba(37,99,235,0.15);
  font-family:'Sora',sans-serif;
}

/* =====================
   CARTE 1 : CLAIRE — entre depuis la gauche avec flash lumineux
   ===================== */
.card-1 {
  border-color:rgba(37,99,235,0.5);
  animation:
    card1Enter 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s forwards,
    cardFloat1 5s ease-in-out 0.9s infinite alternate,
    cardGlow1 3s ease-in-out 0.9s infinite;
}

/* =====================
   CARTE 2 : STRUCTURÉE — entre depuis le bas, plus posée
   ===================== */
.card-2 {
  animation:
    card2Enter 0.85s cubic-bezier(0.22,1,0.36,1) 0.9s forwards,
    cardFloat2 5s ease-in-out 1.75s infinite alternate,
    cardGlow1 3s ease-in-out 1.75s infinite;
}

/* =====================
   CARTE 3 : TRACÉE — entre depuis la droite, plus dynamique
   ===================== */
.card-3 {
  animation:
    card3Enter 0.8s cubic-bezier(0.22,1,0.36,1) 1.2s forwards,
    cardFloat3 5s ease-in-out 2.0s infinite alternate,
    cardGlow1 3s ease-in-out 2.0s infinite;
}

/* ---- ICONE IMAGE ---- */
.card-logo {
  width:180px; height:180px; object-fit:contain;
  filter:drop-shadow(0 10px 20px rgba(37,99,235,0.18));
  animation:logoBreath 3.5s ease-in-out infinite alternate;
}
@keyframes logoBreath {
  0%   { transform:scale(1) translateY(0); filter:drop-shadow(0 10px 20px rgba(37,99,235,0.18)); }
  100% { transform:scale(1.07) translateY(-6px); filter:drop-shadow(0 16px 30px rgba(37,99,235,0.28)); }
}

/* ---- DIVIDER ANIMÉ ---- */
.card-divider {
  height:4px; background:var(--s); border-radius:2px;
  animation:dividerPulse 2s ease-in-out infinite;
}
.card-1 .card-divider { width:80px; }
.card-2 .card-divider { width:80px; animation-delay:0.5s; }
.card-3 .card-divider { width:80px; animation-delay:1s; }
@keyframes dividerPulse {
  0%,100% { width:70px; opacity:0.6; }
  50%      { width:100px; opacity:1; }
}

/* ---- LABEL CARTE ---- */
.card-title {
  font-family:'Sora',sans-serif; font-size:50px; font-weight:700;
  background:linear-gradient(135deg,#1E3A8A,#2563EB);
  background-clip:text; -webkit-background-clip:text; color:transparent;
  letter-spacing:-0.01em;
}

/* Badge "apparaît" sous chaque carte au bon moment */
.card-badge {
  position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
  background:var(--s); color:white;
  font-size:22px; font-weight:700; letter-spacing:3px;
  padding:10px 34px; border-radius:40px 40px 0 0;
  white-space:nowrap; opacity:0;
}
.card-1 .card-badge { animation:badgeSlideUp 0.4s cubic-bezier(0.22,1,0.36,1) 0.65s forwards; }
.card-2 .card-badge { animation:badgeSlideUp 0.4s cubic-bezier(0.22,1,0.36,1) 1.45s forwards; }
.card-3 .card-badge { animation:badgeSlideUp 0.4s cubic-bezier(0.22,1,0.36,1) 1.75s forwards; }

@keyframes badgeSlideUp {
  0%   { opacity:0; transform:translateX(-50%) translateY(20px); }
  100% { opacity:1; transform:translateX(-50%) translateY(0); }
}

/* ---- TITRE PRINCIPAL — attend que les 3 cartes soient là ---- */
.glitch-title {
  font-family:'Sora',sans-serif;
  font-size:110px; font-weight:800; line-height:1.2; text-align:center;
  letter-spacing:-0.02em;
  background:linear-gradient(130deg,var(--p) 0%,var(--s) 45%,#3B82F6 65%,var(--p) 100%);
  background-size:200% auto; background-clip:text; -webkit-background-clip:text; color:transparent;
  opacity:0;
  animation:textShine 4s linear infinite, titleEntrance 0.9s cubic-bezier(0.2,0.9,0.3,1.2) 1.5s forwards;
  max-width:2800px; margin:0 auto;
}
.glitch-title span {
  display:inline-block;
  background:linear-gradient(135deg,#2563EB,#1E3A8A);
  background-clip:text; -webkit-background-clip:text; color:transparent;
  animation:pulseGlowWord 2.2s ease-in-out infinite; font-weight:900;
}

/* =====================
   KEYFRAMES ENTRÉES CARTES
   ===================== */

/* Carte 1 : depuis la gauche, comme si on balayait le flou */
@keyframes card1Enter {
  0%   { opacity:0; transform:translateX(-350px) scale(0.85) rotate(-4deg); filter:blur(12px); }
  55%  { opacity:1; transform:translateX(20px) scale(1.03) rotate(0.5deg); filter:blur(0); }
  75%  { transform:translateX(-8px) scale(0.99); }
  100% { opacity:1; transform:translateX(0) scale(1) rotate(0deg); filter:blur(0); }
}

/* Carte 2 : depuis le bas, comme si elle remontait à la surface */
@keyframes card2Enter {
  0%   { opacity:0; transform:translateY(280px) scale(0.88); filter:blur(10px); }
  55%  { opacity:1; transform:translateY(-18px) scale(1.03); filter:blur(0); }
  75%  { transform:translateY(6px) scale(0.99); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

/* Carte 3 : depuis la droite, rapide et précise */
@keyframes card3Enter {
  0%   { opacity:0; transform:translateX(350px) scale(0.85) rotate(4deg); filter:blur(12px); }
  55%  { opacity:1; transform:translateX(-20px) scale(1.03) rotate(-0.5deg); filter:blur(0); }
  75%  { transform:translateX(8px) scale(0.99); }
  100% { opacity:1; transform:translateX(0) scale(1) rotate(0deg); filter:blur(0); }
}

/* Flottement individuel décalé pour chaque carte */
@keyframes cardFloat1 { 0% { transform:translateY(0) rotate(0deg); }   100% { transform:translateY(-12px) rotate(0.4deg); } }
@keyframes cardFloat2 { 0% { transform:translateY(0) rotate(0deg); }   100% { transform:translateY(-16px) rotate(-0.4deg); } }
@keyframes cardFloat3 { 0% { transform:translateY(0) rotate(0deg); }   100% { transform:translateY(-10px) rotate(0.6deg); } }

@keyframes cardGlow1 {
  0%,100% { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1), 0 0 0 0 rgba(37,99,235,0.08); }
  50%      { box-shadow:0 30px 60px -12px rgba(37,99,235,0.2), 0 0 30px rgba(37,99,235,0.08); }
}

/* Titre final */
@keyframes titleEntrance {
  0%   { opacity:0; transform:translateY(90px) scale(0.93); filter:blur(8px); }
  45%  { opacity:1; transform:translateY(-10px) scale(1.01); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes slideDownPop {
  0%   { opacity:0; transform:translateY(-80px) scale(0.85); filter:blur(12px); }
  60%  { opacity:1; transform:translateY(8px) scale(1.02); filter:blur(0); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

@keyframes badgeGlowPulse {
  0%   { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(37,99,235,0.3); border-color:rgba(37,99,235,0.5); }
  50%  { box-shadow:0 20px 35px -8px rgba(0,0,0,0.15),0 0 0 5px rgba(37,99,235,0.2); border-color:rgba(37,99,235,0.9); }
  100% { box-shadow:0 15px 30px -10px rgba(0,0,0,0.1),0 0 0 0 rgba(37,99,235,0); border-color:rgba(37,99,235,0.5); }
}
@keyframes pulseDot {
  0%,100% { transform:scale(1); opacity:1; box-shadow:0 0 0 0 var(--s); }
  50%      { transform:scale(1.2); opacity:0.9; box-shadow:0 0 0 8px rgba(37,99,235,0.4); }
}
@keyframes textShine {
  0%   { background-position:0% 50%; }
  100% { background-position:200% 50%; }
}
@keyframes pulseGlowWord {
  0%,100% { text-shadow:0 0 0px rgba(37,99,235,0); transform:scale(1); }
  50%      { text-shadow:0 0 12px rgba(37,99,235,0.6); transform:scale(1.02); }
}

/* 4K */
@media (max-width:3840px) {
  .glitch-title { font-size:100px; }
  .badge-text { font-size:34px; }
  .badge-problem { padding:16px 60px; gap:22px; }
  .main-content { gap:70px; }
  .card { padding:50px 70px; min-width:360px; }
  .card-title { font-size:46px; }
  .card-logo { width:160px; height:160px; }
}
.prog, .prog-f { display:none !important; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="floating-line"></div><div class="floating-line floating-line2"></div>
<div class="spark spark-1"></div><div class="spark spark-2"></div><div class="spark spark-3"></div><div class="spark spark-4"></div><div class="spark spark-5"></div>
<div class="pulse-ring"></div>

<div class="main-content">

  <!-- Badge -->
  <div class="badge-problem">
    <div class="pulse-dot"></div>
    <span class="badge-text">CLARTÉ & TRAÇABILITÉ</span>
  </div>

  <!-- Cartes séquentielles -->
  <div class="cards-container">

    <!-- CARTE 1 : CLAIRE — glisse depuis la gauche -->
    <div class="card card-1">
      <span class="card-number">01</span>
      <img class="card-logo" src="claire.png" alt="Claire"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div style="display:none;width:160px;height:160px;align-items:center;justify-content:center;font-size:100px;">✅</div>
      <div class="card-divider"></div>
      <div class="card-title">Claire</div>
      <div class="card-badge">CLAIRE</div>
    </div>

    <!-- CARTE 2 : STRUCTURÉE — monte depuis le bas -->
    <div class="card card-2">
      <span class="card-number">02</span>
      <img class="card-logo" src="structuree.png" alt="Structurée"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div style="display:none;width:160px;height:160px;align-items:center;justify-content:center;font-size:100px;">📐</div>
      <div class="card-divider"></div>
      <div class="card-title">Structurée</div>
      <div class="card-badge">STRUCTURÉE</div>
    </div>

    <!-- CARTE 3 : TRACÉE — glisse depuis la droite -->
    <div class="card card-3">
      <span class="card-number">03</span>
      <img class="card-logo" src="tracee.png" alt="Tracée"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div style="display:none;width:160px;height:160px;align-items:center;justify-content:center;font-size:100px;">🔍</div>
      <div class="card-divider"></div>
      <div class="card-title">Tracée</div>
      <div class="card-badge">TRACÉE</div>
    </div>

  </div>

  <!-- Titre — arrive en dernier après les 3 cartes -->
  <h1 class="glitch-title">
    Chaque étape est <span>claire</span>,<br>structurée et tracée.
  </h1>

</div>
</body>
</html>
